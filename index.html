            data: {
                crypto: {
                    encrypt(obj) {
                        const jsonStr = JSON.stringify(obj);
                        const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
                        return base64.split('').reverse().join(''); 
                    },
                    decrypt(encodedStr) {
                        try {
                            const base64 = encodedStr.split('').reverse().join('');
                            const jsonStr = decodeURIComponent(escape(atob(base64)));
                            return JSON.parse(jsonStr);
                        } catch(e) {
                            throw new Error("Format Error");
                        }
                    }
                },
    
                saveAutoBackupSettings() {
                    const freq = document.getElementById('auto-backup-freq').value;
                    const isEng = app.lang.current === 'en';
                    localStorage.setItem('CAMS-I_autobackup_freq', freq);
                    Swal.fire({icon: 'success', title: isEng ? 'Saved' : 'تم الحفظ', toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff'});
                },
    
                async checkAutoBackup() {
                    const freq = parseInt(localStorage.getItem('CAMS-I_autobackup_freq')) || 0;
                    if (freq === 0) return;
                    const isEng = app.lang.current === 'en';
    
                    const lastBackupDate = parseInt(localStorage.getItem('CAMS-I_last_backup_time')) || 0;
                    const now = Date.now();
                    const daysPassed = (now - lastBackupDate) / (1000 * 60 * 60 * 24);
    
                    if (daysPassed >= freq) {
                        const conf = await Swal.fire({
                            title: isEng ? 'Backup Reminder' : 'حان وقت النسخ الاحتياطي!',
                            text: isEng ? `It has been ${freq} days since your last backup. Please save your data.` : `مر أكثر من ${freq} أيام على آخر نسخة. لحماية بياناتك، يرجى حفظ نسخة الآن.`,
                            icon: 'info',
                            showCancelButton: true,
                            confirmButtonText: isEng ? 'Backup Now' : 'حفظ الآن',
                            cancelButtonText: isEng ? 'Skip' : 'تخطي الآن',
                            confirmButtonColor: '#10b981',
                            background: '#1e293b',
                            color: '#fff'
                        });
    
                        if (conf.isConfirmed) {
                            await this.backup(true); 
                            localStorage.setItem('CAMS-I_last_backup_time', now.toString());
                        }
                    }
                },
    
                async backup(isAuto = false) {
                    let exportData;
                    let fileNameSuffix;
                    const isEng = app.lang.current === 'en';
    
                    if (isAuto === true) {
                        exportData = { ...app.state.data, backupType: 'full_system' };
                        fileNameSuffix = 'Auto_All_System';
                    } else {
                        const result = await Swal.fire({
                            title: isEng ? 'Data Export' : 'إنشاء نسخة احتياطية',
                            text: isEng ? 'Select what to export (Encrypted file):' : 'ما الذي تريد تصديره؟ (النسخة مشفرة ومحمية)',
                            icon: 'question',
                            showDenyButton: true,
                            showCancelButton: true,
                            confirmButtonText: isEng ? 'Current Course Only' : 'المقرر الحالي فقط',
                            denyButtonText: isEng ? 'Full System' : 'كل المقررات',
                            cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                            confirmButtonColor: '#3b82f6',
                            denyButtonColor: '#8b5cf6',
                            background: '#1e293b',
                            color: '#fff',
                            customClass: { actions: 'flex-col md:flex-row gap-2' }
                        });
    
                        if (result.isDismissed) return;
    
                        if (result.isConfirmed) {
                            const activeYear = app.getActiveYear();
                            exportData = {
                                activeYearId: activeYear.id,
                                collegeName: app.state.data.collegeName,
                                universityName: app.state.data.universityName,
                                fraudAlerts: app.state.data.fraudAlerts || [],
                                years: [activeYear], 
                                backupType: 'single_year' 
                            };
                            fileNameSuffix = activeYear.name.replace(/[^a-z0-9]/gi, '_');
                        } else if (result.isDenied) {
                            exportData = { ...app.state.data, backupType: 'full_system' };
                            fileNameSuffix = 'Full_Backup';
                        }
                    }
    
                    localStorage.setItem('CAMS-I_last_backup_time', Date.now().toString());
    
                    try {
                        const encryptedData = this.crypto.encrypt(exportData);
                        const fileName = `CAMS-I_${fileNameSuffix}_${new Date().toISOString().slice(0,10)}.vnb`;
    
                        if (window.AndroidBridge && typeof window.AndroidBridge.saveBackup === 'function') {
                            window.AndroidBridge.saveBackup(encryptedData, fileName);
                            return;
                        }
    
                        if (window.showSaveFilePicker) {
                            const fileHandle = await window.showSaveFilePicker({
                                suggestedName: fileName,
                                types: [{ description: 'CAMS-I Backup', accept: {'application/octet-stream': ['.vnb']} }],
                            });
                            const writable = await fileHandle.createWritable();
                            await writable.write(encryptedData);
                            await writable.close();
                            Swal.fire({icon: 'success', title: isEng ? 'Saved' : 'تم الحفظ', toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#1e293b', color: '#fff'});
                            return;
                        }
    
                        const blob = new Blob([encryptedData], {type: "application/octet-stream"});
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = fileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
    
                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            Swal.fire({icon: 'error', title: isEng ? 'Error' : 'خطأ', text: isEng ? 'Export failed' : 'فشل تصدير البيانات', background: '#1e293b', color: '#fff'});
                        }
                    }
                },
    
                restore(input) {
                    const file = input.files[0];
                    if(!file) return;
                    const isEng = app.lang.current === 'en';
                    const reader = new FileReader();
                    
                    reader.onload = async (e) => {
                        try {
                            const encryptedStr = e.target.result;
                            const incomingData = this.crypto.decrypt(encryptedStr);
    
                            if (!incomingData.years || incomingData.years.length === 0) throw new Error("Format");
    
                            const isSingle = incomingData.backupType === 'single_year' || incomingData.years.length === 1;
    
                            if (isSingle) {
                                const importedYear = incomingData.years[0];
                                const conf = await Swal.fire({
                                    title: isEng ? 'Restore Course' : 'استعادة مقرر واحد',
                                    text: isEng ? `Import data for (${importedYear.name})?` : `تم التعرف على بيانات (${importedYear.name}). سيتم إضافتها دون مسح الباقي.`,
                                    icon: 'info',
                                    showCancelButton: true,
                                    confirmButtonText: isEng ? 'Restore' : 'نعم، استعادة',
                                    cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                                    confirmButtonColor: '#10b981',
                                    background: '#1e293b', color: '#fff'
                                });
    
                                if (conf.isConfirmed) {
                                    let currentDB = JSON.parse(localStorage.getItem(server.KEY)) || app.state.data;
                                    const existingIndex = currentDB.years.findIndex(y => y.id === importedYear.id);
                                    if (existingIndex > -1) {
                                        currentDB.years[existingIndex] = importedYear;
                                    } else {
                                        currentDB.years.push(importedYear);
                                    }
                                    currentDB.activeYearId = importedYear.id;
                                    localStorage.setItem(server.KEY, JSON.stringify(currentDB));
                                    Swal.fire({ icon: 'success', title: isEng ? 'Success' : 'تمت الاستعادة بنجاح', showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff' }).then(() => location.reload());
                                }
                            } else {
                                const conf = await Swal.fire({
                                    title: isEng ? 'Full System Restore' : 'استعادة النظام بالكامل',
                                    text: isEng ? 'Warning: This will overwrite ALL existing courses!' : 'تحذير: هذا سيمسح جميع المقررات الحالية ويستبدلها. متأكد؟',
                                    icon: 'warning',
                                    showCancelButton: true,
                                    confirmButtonText: isEng ? 'Replace Data' : 'نعم، استبدال',
                                    cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                                    confirmButtonColor: '#ef4444',
                                    background: '#1e293b', color: '#fff'
                                });
    
                                if (conf.isConfirmed) {
                                    localStorage.setItem(server.KEY, JSON.stringify(incomingData));
                                    Swal.fire({ icon: 'success', title: isEng ? 'Restored' : 'تمت الاستعادة بنجاح', showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff' }).then(() => location.reload());
                                }
                            }
                        } catch(err) {
                            Swal.fire({icon:'error', title: isEng ? 'Error' : 'فشل الاستعادة', text: isEng ? 'Invalid or corrupted file.' : 'هذا الملف غير صالح أو تم العبث به.', background:'#1e293b', color:'#fff'});
                        }
                        input.value = '';
                    };
                    reader.readAsText(file);
                },
    
                resetAll() {
                    const isEng = app.lang.current === 'en';
                    Swal.fire({
                        title: isEng ? 'Delete Course Completely?' : 'حذف المقرر بالكامل؟',
                        text: isEng ? 'Warning: This course and ALL its data will be permanently deleted!' : 'تحذير: سيتم حذف هذا المقرر بالكامل من النظام بكل بياناته (الطلاب، السجلات، الجلسات)! لا يمكن التراجع.',
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: isEng ? 'Yes, Delete' : 'نعم، احذف نهائياً',
                        cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                        confirmButtonColor: '#d33',
                        background: '#1e293b',
                        color: '#fff'
                    }).then(async r => {
                        if(r.isConfirmed) {
                            // إظهار اللودينج لمنع المتصفح من إيقاف العملية
                            Swal.fire({ title: isEng ? 'Deleting...' : 'جاري الحذف...', background: '#1e293b', color: '#fff', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

                            const activeId = server.db.activeYearId;
                            
                            // 1. مسح المقرر نهائياً من مصفوفة المقررات
                            server.db.years = server.db.years.filter(y => y.id !== activeId);
                            
                            // 2. فحص: هل تبقى مقررات أخرى؟
                            if (server.db.years.length === 0) {
                                // لو ده كان آخر مقرر، امسح قاعدة البيانات بالكامل ورجع وضع المصنع عشان السيرفر يفضى
                                localStorage.removeItem(server.KEY);
                                server.db = server.getDefaultDB();
                            } else {
                                // لو في مقررات تانية، انقل التفعيل لأول مقرر متاح
                                server.db.activeYearId = server.db.years[0].id;
                            }
    
                            // 3. تصفير الذاكرة المؤقتة للدمج
                            app.state.groupMerges = {};
                            app.state.activeMergeGroups = [];
                            
                            // 4. 🔥 الأهم: حفظ التغيير وانتظار رد بايثون قبل عمل ريلود للصفحة 🔥
                            await server.save(); 
                            location.reload();
                        }
                    });
                },
    
                moveSelectedPrompt() {
                    const isEng = app.lang.current === 'en';
                    let ids = [];
                    
                    const ctxMenu = document.getElementById('context-menu');
                    
                    // 🔥 التعديل الذكي: تحديد الطلاب بناءً على طريقة الضغط
                    if (ctxMenu && ctxMenu.classList.contains('active') && app.ui.contextTargetId) {
                        const targetId = app.ui.contextTargetId;
                        const isTargetChecked = document.querySelector(`.std-chk[value="${targetId}"]`)?.checked;
                        
                        if (!isTargetChecked) {
                            ids = [targetId];
                        } else {
                            ids = Array.from(document.querySelectorAll('.std-chk:checked')).map(c => c.value);
                        }
                        ctxMenu.classList.remove('active');
                    } else {
                        ids = Array.from(document.querySelectorAll('.std-chk:checked')).map(c => c.value);
                    }

                    if(ids.length === 0) return Swal.fire({text: isEng ? 'Select students first' : 'حدد طلاب أولاً للنقل', icon:'warning', background:'#1e293b', color:'#fff'});
    
                    const year = app.getActiveYear();
                    const options = {};
                    
                    // 🔥 السحر هنا: إضافة خيار "إنشاء مجموعة جديدة" كأول خيار في القائمة المنسدلة
                    options['NEW_GROUP_MAGIC_KEY'] = isEng ? 'Create New Group...' : 'إنشاء مجموعة جديدة...';
                    
                    if (year.groups) {
                        year.groups.forEach(g => options[g.Name] = g.Name);
                    }
    
                    Swal.fire({
                        title: isEng ? `Move ${ids.length} student(s) to...` : `نقل ${ids.length} طالب إلى...`,
                        input: 'select',
                        inputOptions: options,
                        showCancelButton: true,
                        confirmButtonText: isEng ? 'Next' : 'التالي',
                        cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                        background: '#1e293b',
                        color: '#fff'
                    }).then(async r => {
                        if(r.isConfirmed && r.value) {
                            let targetGroupName = r.value;
                            
                            // 🚀 لو اختار إنه يعمل مجموعة جديدة من جوه القائمة
                            if (targetGroupName === 'NEW_GROUP_MAGIC_KEY') {
                                const { value: newName } = await Swal.fire({
                                    title: isEng ? 'New Group Name' : 'اسم المجموعة الجديدة',
                                    input: 'text',
                                    inputPlaceholder: isEng ? 'Enter group name...' : 'اكتب اسم المجموعة هنا...',
                                    showCancelButton: true,
                                    confirmButtonText: isEng ? 'Create & Move' : 'إنشاء ونقل',
                                    cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                                    confirmButtonColor: '#10b981',
                                    background: '#1e293b',
                                    color: '#fff',
                                    inputValidator: (val) => {
                                        if (!val) return isEng ? 'Name is required!' : 'الاسم مطلوب!';
                                        if (year.groups && year.groups.some(g => g.Name === val)) return isEng ? 'Name already exists!' : 'الاسم موجود بالفعل!';
                                    }
                                });
                                
                                if (!newName) return; // لو عمل إلغاء
                                
                                // إنشاء المجموعة فوراً في السيرفر بنفس إعدادات الجلسات الافتراضية
                                const defSessions = parseInt(year.defaultSessions) || 1;
                                const sessions = [];
                                for(let i=0; i<defSessions; i++) sessions.push({Day: isEng ? 'Saturday' : 'السبت', Time: ''});
                                
                                await server.request('/api/groups/add', 'POST', {
                                    Name: newName, Day: isEng ? 'Saturday' : 'السبت', Time: '', Sessions: sessions
                                });
                                
                                targetGroupName = newName;
                            }

                            // 🔄 نقل الطلاب للمجموعة الهدف (سواء قديمة أو لسه مخلوقة حالا)
                            for(const id of ids) {
                                await server.request('/api/students/update_group', 'POST', {id, group: targetGroupName});
                            }
    
                            // تحديث كل شاشات وقوائم النظام لتعكس التغييرات
                            app.state.data = await server.request('/api/init');
                            app.students.renderTable();
                            app.students.updateBulkBtn();
                            document.querySelectorAll('.std-chk').forEach(c => c.checked = false);
                            
                            app.ui.populateGlobalDropdowns(); // تحديث قوائم الفلاتر
                            if(app.groups && app.groups.renderGrid) app.groups.renderGrid(); // تحديث كروت المجموعات
    
                            Swal.fire({
                                icon:'success', 
                                title: isEng ? 'Success' : 'تم بنجاح', 
                                text: isEng ? `Moved to ${targetGroupName}` : `تم نقل ${ids.length} طالب إلى (${targetGroupName})`, 
                                background:'#1e293b', color:'#fff'
                            });
                        }
                    });
                }
            },
    








          backHandler: {
                init() {
                    window.addEventListener('popstate', function (event) {
                        const visibleModal = document.querySelector('.fixed.flex:not(.hidden)');
                        if (visibleModal) {
                            app.ui.closeModal(visibleModal.id);
                            history.pushState(null, document.title, location.href);
                        } else if (document.getElementById('sidebar').classList.contains('open')) {
                            app.ui.toggleSidebar(false);
                            history.pushState(null, document.title, location.href);
                        }
                    });
                    history.pushState(null, document.title, location.href);
                }
            },
    
            async checkPermissions() {
                if (window.Capacitor) {
                    try {
                        const camStatus = await window.Capacitor.Plugins.Camera.checkPermissions();
                        if (camStatus.camera !== 'granted') {
                            await window.Capacitor.Plugins.Camera.requestPermissions();
                        }
                    } catch(e) {}
    
                    try {
                        const fileStatus = await window.Capacitor.Plugins.Filesystem.checkPermissions();
                        if (fileStatus.publicStorage !== 'granted') {
                            await window.Capacitor.Plugins.Filesystem.requestPermissions();
                        }
                    } catch(e) {}
                }
            }
    
        }; 
    
    window.app = app;

    // ---------------------------------------------------------
    // 🔥 الجسر الوهمي للرد على تنبيهات تطبيق الطالب (Windows Bridge) 🔥
    // ---------------------------------------------------------
    window.AndroidBridge = window.AndroidBridge || {};
    window.AndroidBridge.statusMap = {};
    
    window.AndroidBridge.updateStatus = function(id, status) {
        this.statusMap[id] = status;
        // تصفير الحالة بعد 10 ثواني لمنع تعليق هاتف الطالب على حالة واحدة
        setTimeout(() => { 
            if(this.statusMap[id] === status) delete this.statusMap[id]; 
        }, 10000);
    };
    
    window.AndroidBridge.getStatus = function(id) {
        return this.statusMap[id] || 'pending';
    };
    // ---------------------------------------------------------

    window.injectRadarPing = function(studentId, studentName, macAddress, rssiValue) {
        if (!app.state.isServerOpen) return;
        server.request('/api/radar/ping', 'POST', {
            id: studentId,
            name: studentName,
            mac: macAddress,
            rssi: parseFloat(rssiValue)
        });
    };

    window.addEventListener('DOMContentLoaded', async () => {
        await app.checkPermissions();
        app.lang.init();
        await server.loadDB();
        app.init();

        window.addEventListener('popstate', function (event) {
            const visibleModal = document.querySelector('.fixed.flex:not(.hidden)');
            if (visibleModal) {
                app.ui.closeModal(visibleModal.id);
                history.pushState(null, document.title, location.href);
            } else if (document.getElementById('sidebar').classList.contains('translate-x-0')) {
                app.ui.toggleSidebar(false);
                history.pushState(null, document.title, location.href);
            }
        });
        
        history.pushState(null, document.title, location.href);
    });
    </script>
