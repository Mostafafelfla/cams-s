            background-color: #0f172a;

    <script>  /**
         * MockServer Class - المحدث للعمل مع قاعدة البيانات المادية والانتظار الإجباري
         */
        class MockServer {
            constructor() {
                this.KEY = 'vet_nour_ultimate_v6_5';
                this.db = this.getDefaultDB();
                this.livePings = {}; 
            }

            getDefaultDB() {
                const isEng = localStorage.getItem('vet_lang') === 'en';
                return {
                    activeYearId: 'y1',
                    collegeName: isEng ? 'Faculty Name' : 'اسم الكلية',
                    universityName: isEng ? 'University Name' : 'اسم الجامعة',
                    fraudAlerts: [],
                    years: [
                        {
                            id: 'y1',
                            name: isEng ? 'Default Course' : 'مقرر افتراضي', 
                            semester: {
                                start: new Date().toISOString().split('T')[0],
                                end: new Date(new Date().setMonth(new Date().getMonth() + 4)).toISOString().split('T')[0]
                            },
                            students: [],
                            groups: [], 
                            logs: [],
                            weekMapping: {},
                            holidays: {},
                            defaultSessions: 1
                        }
                    ]
                };
            }

            // 🔥 الدالة السحرية: جلب البيانات من ملف الويندوز الحقيقي 🔥
            async loadDB() {
                try {
                    const res = await fetch('http://127.0.0.1:5050/api/db/load');
                    const parsed = await res.json();
                    if (parsed && parsed.years && parsed.years.length > 0) {
                        if (!parsed.fraudAlerts) parsed.fraudAlerts = [];
                        this.db = parsed;
                        return;
                    }
                } catch(e) {
                    console.warn("DB Server not reachable yet, falling back...");
                }

                // خطة طوارئ: سحب البيانات القديمة من المتصفح لو موجودة ونقلها للملف الجديد
                try {
                    const saved = localStorage.getItem(this.KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed && parsed.years && parsed.years.length > 0) {
                            if (!parsed.fraudAlerts) parsed.fraudAlerts = [];
                            this.db = parsed;
                            await this.save(); // حفظ فوري في الملف الفعلي
                            return;
                        }
                    }
                } catch(e) {}
            }

            // 🔥 التعديل الجذري: تحويل دالة الحفظ لانتظار رد سيرفر بايثون (await) لمنع قتل الاتصال 🔥
            async save() { 
                try {
                    await fetch('http://127.0.0.1:5050/api/db/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.db)
                    });
                } catch(e) {}

                // باك آب سريع للمتصفح كأمان إضافي (لو المساحة تسمح)
                try { localStorage.setItem(this.KEY, JSON.stringify(this.db)); } catch(e){}
            }

            get activeYear() { return this.db.years.find(y => y.id === this.db.activeYearId) || this.db.years[0]; }

            async request(endpoint, method, payload) {
                const year = this.activeYear;
                const isEng = localStorage.getItem('vet_lang') === 'en'; 

                try {
                    switch(endpoint) {
                        case '/api/radar/ping':
                            this.livePings[payload.id] = {
                                id: payload.id, name: payload.name, rssi: payload.rssi, mac: payload.mac, lastSeen: Date.now() 
                            };
                            return true;
    
                        case '/api/radar/live':
                            const now = Date.now();
                            for (let key in this.livePings) {
                                if (now - this.livePings[key].lastSeen > 10000) delete this.livePings[key];
                            }
                            return Object.values(this.livePings);
    
                        case '/api/init': return JSON.parse(JSON.stringify(this.db));
    
                        case '/api/students/link_device':
                            const targetStudent = year.students.find(s => String(s.ID).trim() === String(payload.id).trim());
                            
                            if(targetStudent) {
                                targetStudent.DeviceID = payload.mac;
                                await this.save(); 
                                return true;
                            } else {
                                let found = false;
                                this.db.years.forEach(y => {
                                    const s = y.students.find(std => String(std.ID).trim() === String(payload.id).trim());
                                    if(s) { s.DeviceID = payload.mac; found = true; }
                                });
                                if(found) { await this.save(); return true; }
                                return false; 
                            }

                        case '/api/import_excel':
                            const importedStudents = payload.students;
                            const importedLogs = payload.logs;
                            const newGroups = payload.newGroups || [];

                            newGroups.forEach(gName => {
                                if (gName && gName !== 'General' && !year.groups.some(g => g.Name === gName)) {
                                    year.groups.push({ Name: gName, Day: isEng ? '-' : '-', Time: '' });
                                }
                            });

                            importedStudents.forEach(newStd => {
                                const existsIndex = year.students.findIndex(s => String(s.ID).trim() === newStd.ID);
                                if (existsIndex > -1) {
                                    year.students[existsIndex].Name = newStd.Name;
                                    year.students[existsIndex].Group = newStd.Group;
                                } else {
                                    year.students.push(newStd);
                                }
                            });

                            importedLogs.forEach(newLog => {
                                const currentSubSession = newLog.SubSession || "1"; 
                                const alreadyPresent = year.logs.some(l => l.ID === newLog.ID && l.Week === newLog.Week && (l.SubSession || "1") === currentSubSession);
                                if (!alreadyPresent) {
                                    year.logs.push({...newLog, SubSession: currentSubSession});
                                }
                            });

                            await this.save(); 
                            return true;

                        case '/api/year/switch': 
                            this.db.activeYearId = payload.id; 
                            await this.save(); 
                            return true;

                        case '/api/year/add':
                            this.db.years.push({ 
                                id: `y_${Date.now()}`, 
                                name: payload.name, 
                                semester: {...year.semester}, 
                                students: [], groups: [], logs: [], weekMapping: {}, holidays: {}, defaultSessions: 1
                            });
                            this.db.activeYearId = this.db.years[this.db.years.length-1].id;
                            await this.save(); 
                            return true;
    
                        case '/api/students/add': 
                            if(year.students.some(s => s.ID === payload.ID)) throw new Error(isEng ? "Student ID already exists" : "رقم الطالب موجود بالفعل"); 
                            year.students.push(payload); 
                            await this.save(); 
                            return true;
                            
                        case '/api/students/delete': 
                            year.students = year.students.filter(s => s.ID !== payload.id); 
                            year.logs = year.logs.filter(l => l.ID !== payload.id); 
                            await this.save(); 
                            return true;
                            
                        case '/api/students/update_group': 
                            const s = year.students.find(x => x.ID === payload.id); 
                            if(s) { s.Group = payload.group; await this.save(); } 
                            return true;
    
                        case '/api/groups/add': 
                            if(year.groups.some(g => g.Name === payload.Name)) throw new Error(isEng ? "Group name already exists" : "اسم المجموعة موجود بالفعل"); 
                            year.groups.push(payload); 
                            await this.save(); 
                            return true;
                            
                        case '/api/groups/update': 
                            const gIdx = year.groups.findIndex(g => g.Name === payload.oldName); 
                            if(gIdx > -1) { 
                                year.groups[gIdx] = payload.newData; 
                                if(payload.oldName !== payload.newData.Name) { 
                                    year.students.forEach(st => { if(st.Group === payload.oldName) st.Group = payload.newData.Name; }); 
                                } 
                                await this.save(); 
                            } 
                            return true;
                            
                        case '/api/groups/delete':
                            year.groups = year.groups.filter(g => g.Name !== payload.name);
                            year.students.forEach(st => {
                                if(st.Group === payload.name) st.Group = '';
                            });
                            await this.save(); 
                            return true;
    
                        case '/api/groups/split': { 
                            const splitCount = payload.count; 
                            const studentsToSplit = year.students.sort((a,b) => a.Name.localeCompare(b.Name, 'ar'));
    
                            year.groups = [];
                            for(let i=1; i<=splitCount; i++) {
                                year.groups.push({Name: isEng ? `Group ${i}` : `مجموعة ${i}`, Day: isEng ? '-' : '-', Time:''});
                            }
    
                            const chunkSize = Math.ceil(studentsToSplit.length / splitCount);
                            studentsToSplit.forEach((std, idx) => {
                                let groupIdx = Math.floor(idx / chunkSize);
                                if(groupIdx >= year.groups.length) groupIdx = year.groups.length - 1;
                                std.Group = year.groups[groupIdx].Name;
                            });
    
                            await this.save(); 
                            return true;
                        } 
                        
                        case '/api/scan':
                            const { id, week, status, sessionGroup, deviceID, rssi, subSession } = payload;
                            const studentToScan = year.students.find(std => std.ID === id);
                            if(!studentToScan) throw new Error(app.lang.current === 'en' ? "Student not registered" : "الطالب غير مسجل");
                            
                            const currentSubSession = subSession || "1";
                            const existsIndex = year.logs.findIndex(l => l.ID === id && l.Week === week && (l.SubSession || "1") === currentSubSession);
                            const timeStr = new Date().toLocaleTimeString('en-US', {hour12:true, hour:'2-digit', minute:'2-digit'});
                            
                            if(existsIndex > -1) { 
                                year.logs[existsIndex].Status = status; 
                                year.logs[existsIndex].Time = timeStr;
                                if(sessionGroup && sessionGroup !== 'All') year.logs[existsIndex].SessionGroup = sessionGroup;
                                if(deviceID) year.logs[existsIndex].DeviceID = deviceID;
                                if(rssi) year.logs[existsIndex].RSSI = rssi;
                            } else { 
                                year.logs.push({ 
                                    ID: id, Name: studentToScan.Name, SessionGroup: sessionGroup || studentToScan.Group, 
                                    Group: studentToScan.Group, Week: week, SubSession: currentSubSession, 
                                    Date: new Date().toLocaleDateString('en-GB'), Time: timeStr, 
                                    Status: status, DeviceID: deviceID || studentToScan.DeviceID, RSSI: rssi || -40 
                                }); 
                            }
                            await this.save(); 
                            return {student: studentToScan};
    
                        case '/api/scan/delete': 
                            const targetSubSess = payload.subSession || "1";
                            year.logs = year.logs.filter(l => !(l.ID === payload.id && l.Week === payload.week && (l.SubSession || "1") === targetSubSess)); 
                            await this.save(); 
                            return true;
    
                        case '/api/bind_device':
                            const targetStd = year.students.find(s => s.ID === payload.id);
                            if (targetStd && payload.deviceID) {
                                targetStd.DeviceID = payload.deviceID; 
                                await this.save();
                            }
                            return true;

                        case '/api/settings/save':
                            const targetYear = this.db.years.find(y => y.id === this.db.activeYearId);
                            if (!targetYear) return false;

                            if (payload.name) targetYear.name = payload.name;
                            if (payload.semester) {
                                targetYear.semester = payload.semester;
                                if (payload.defaultSessions) targetYear.defaultSessions = payload.defaultSessions;
                            }
                            if (payload.mapping) {
                                if (!targetYear.weekMapping) targetYear.weekMapping = {};
                                targetYear.weekMapping[payload.scope] = payload.mapping;
                            }
                            if (payload.holiday) {
                                if (!targetYear.holidays) targetYear.holidays = {};
                                if (!targetYear.holidays[payload.scope]) targetYear.holidays[payload.scope] = [];
                                if (payload.remove) {
                                    targetYear.holidays[payload.scope] = targetYear.holidays[payload.scope].filter(w => w !== payload.week);
                                } else {
                                    if (!targetYear.holidays[payload.scope].includes(payload.week)) targetYear.holidays[payload.scope].push(payload.week);
                                }
                            }
                            if (payload.identity) {
                                this.db.collegeName = payload.identity.collegeName;
                                this.db.universityName = payload.identity.universityName;
                            }

                            await this.save(); 
                            return true;

                        case '/api/reset': 
                            // تنظيف الملف الحقيقي بالإضافة للـ LocalStorage
                            await fetch('http://127.0.0.1:5050/api/db/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: "{}"}).catch(()=>{});
                            localStorage.removeItem(this.KEY); 
                            location.reload(); 
                            return true;
                    }
                } catch(e) { console.error(e); return {error: e.message}; }
            }
        }

        const server = new MockServer();

        // 1. نظام الأصوات الذكي (توليد نغمات فورية بدون تحميل ملفات) | Smart Audio System
        const audioSuccess = {
        play: function() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square'; osc.frequency.value = 1200; gain.gain.value = 0.1;
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 150);
            } catch(e) {}
        }
        };

        const audioError = {
        play: function() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();

                        // الوقت المتبقي (بالموجب يعني لسه هتبدأ، بالسالب يعني بدأت بالفعل)
                        const diff = startMinutes - currentMinutes;

    refreshOTP() {
        // 1. التأكد من أن السيرفر يعمل
        if (!app.state.isServerOpen) return;
        
        let newCode = '';
        let localIp = "UNKNOWN";

        // 2. محاولة جلب الـ IP الحقيقي من الأندرويد
        if (window.AndroidBridge && window.AndroidBridge.getLocalIpAddress) {
            localIp = window.AndroidBridge.getLocalIpAddress();
        }

        // 3. 🔥 التشفير العشوائي المملح (Salted IP Encryption) 🔥
        if (localIp !== "UNKNOWN" && localIp.includes('.')) {
            const parts = localIp.split('.');
            if (parts.length === 4) {
                // نأخذ آخر خانتين فقط من الـ IP لأنهما الأهم
                const oct3 = parseInt(parts[2]);
                const oct4 = parseInt(parts[3]);
                const ipValue = (oct3 * 256) + oct4;
                
                // توليد رقم عشوائي (مفتاح سري) بين 0 و 900 لكي يتغير الكود كل ضغطة!
                const randomSalt = Math.floor(Math.random() * 900);
                
                // دمج الرقم العشوائي مع الـ IP
                const encryptedNum = ipValue + (randomSalt * 65536);
                
                newCode = encryptedNum.toString(36).toUpperCase(); 
                newCode = newCode.padStart(5, '0'); // نضمن أنه 5 رموز دائماً
            }
        }

        // 4. خطة الطوارئ لو فشل سحب الـ IP
        // (تم إزالة الحروف والأرقام المتشابهة مثل 0, O, 1, I, L لمنع لخبطة الطلاب)
        if (!newCode || newCode.length < 5) {
            const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
            newCode = '';
            for (let i = 0; i < 5; i++) {
                newCode += chars.charAt(Math.floor(Math.random() * chars.length));
            }
        }
        
        // 5. حفظ الكود في الذاكرة وتحديث الشاشة للدكتور
        app.state.currentCode = newCode;
        document.getElementById('otp-code-text').innerText = newCode;
        
        // 6. تأثير بصري مريح (نبضة سريعة) لزر الكود ليعرف الدكتور أنه تم التحديث
        const box = document.getElementById('otp-box-inner');
        if (box) {
            box.classList.add('scale-110');
            setTimeout(() => box.classList.remove('scale-110'), 200);
        }
    },

           // *** FIX 2: Dynamic Weeks Calculation (مترجم ومطور) ***
calculateTime() {
    const year = this.getActiveYear();
    const isEng = app.lang.current === 'en'; // فحص حالة اللغة الحالية
    
    // 1. تحديث اسم المقرر في واجهة الموبايل والسايدبار
    const mobileDisplay = document.getElementById('current-year-display-mobile');
    if(mobileDisplay) mobileDisplay.innerText = year.name;

    const sidebarDisplay = document.getElementById('current-year-display');
    if(sidebarDisplay) sidebarDisplay.innerText = year.name;

    // 2. معالجة التواريخ وحساب الأسابيع
    const start = new Date(year.semester.start);
    const end = new Date(year.semester.end);
    const today = new Date();

    // حساب الأسبوع الحالي بناءً على تاريخ البداية
    const diffTimeCurrent = today - start;
    const currentW = Math.ceil(diffTimeCurrent / (1000 * 60 * 60 * 24 * 7));
    this.state.currentWeek = currentW > 0 ? `Week ${currentW}` : "Week 1";

    // حساب إجمالي أسابيع الترم بناءً على تاريخ النهاية
    const diffTimeTotal = end - start;
    const totalDays = Math.ceil(diffTimeTotal / (1000 * 60 * 60 * 24));
    this.state.totalWeeks = Math.max(1, Math.ceil(totalDays / 7)); 

    // 3. تحديث عرض التاريخ الحالي بتنسيق دولي
    const dateOptions = { day: '2-digit', month: '2-digit', year: 'numeric' };
    const formattedDate = today.toLocaleDateString(isEng ? 'en-GB' : 'ar-EG-u-nu-latn', dateOptions);
    
    const dateDisplay = document.getElementById('current-date-display');
    if(dateDisplay) dateDisplay.innerText = formattedDate;
    
    const attDateDisplay = document.getElementById('att-date-display');
    if(attDateDisplay) {
        attDateDisplay.innerHTML = `<i class="fa-regular fa-calendar"></i> ${formattedDate}`;
    }

    // 4. بناء قائمة الخيارات (Options) للقوائم المنسدلة
    // ملاحظة تقنية: القيمة (value) تظل بالإنجليزية "Week 1" للتعامل مع قاعدة البيانات، 
    // بينما النص المعروض (Text) يتغير حسب لغة الواجهة "أسبوع ١".
    const wPrefix = isEng ? 'Week ' : 'الأسبوع ';
    const opts = Array.from({length: this.state.totalWeeks}, (_, i) => {
        const weekNum = i + 1;
        const weekLabel = isEng ? weekNum : weekNum.toLocaleString('ar-EG'); // تحويل الأرقام لعربية في الواجهة العربية
        return `<option value="Week ${weekNum}">${wPrefix}${weekLabel}</option>`;
    }).join('');

    // 5. تحديث القوائم المنسدلة (التحضير، التحضير المزدوج، الترحيل)
    const selectors = ['scan-week', 'double-week-select', 'map-target'];
    selectors.forEach(id => {
        const el = document.getElementById(id);
        if(el) {
            const currentVal = el.value; // حفظ القيمة المختارة حالياً قبل إعادة الرسم
            const defaultLabel = isEng ? '-- Select --' : '-- اختر --';
            
            el.innerHTML = (id.includes('double') ? `<option value="">${defaultLabel}</option>` : '') + opts;

            // الحفاظ على الأسبوع المختار أو ضبطه على الأسبوع الحالي تلقائياً
            if(id === 'scan-week') {
                el.value = currentVal || this.state.currentWeek;
            }
        }
    });

    // 6. تحديث حقل "الأسبوع الفعلي" في قسم ترحيل الأسابيع
    const mapRealEl = document.getElementById('map-real');
    if(mapRealEl) {
        const currentWeekNum = this.state.currentWeek.replace('Week ', '');
        mapRealEl.value = isEng ? 
            this.state.currentWeek : 
            `الأسبوع ${parseInt(currentWeekNum).toLocaleString('ar-EG')}`;
    }
},

    security: {
        // 🔥 المعالج الذكي المحدث (يدعم الجلسات المتعددة بدقة)
        async handleIncomingRequest(data) {
            try {
                const isEng = app.lang.current === 'en'; 
                // -------------------------------------------------------------
                // 1️⃣ المرحلة الأولى: الجدار الناري (فحص الإعدادات)
                // -------------------------------------------------------------
                const groupSelect = document.getElementById('scan-group');
                const currentGroup = groupSelect ? groupSelect.value : 'All';
                
                // 🔥 قراءة رقم الجلسة الحالية من الشاشة
                const sessionSelect = document.getElementById('scan-session');
                const currentSubSession = sessionSelect ? sessionSelect.value : "1";
    
                if (!currentGroup || currentGroup === 'All' || currentGroup === 'Select') {
                    return { status: 'error', msg: 'section_required' };
                }
    
                if (!app.state.isServerOpen || !app.state.currentCode) {
                    return { status: 'error', msg: isEng ? 'Server is currently closed' : 'السيرفر مغلق حالياً' };
                }
    
                // -------------------------------------------------------------
                // 2️⃣ المرحلة الثانية: استخراج البيانات والتحقق من OTP
                // -------------------------------------------------------------
                let studentID, incomingMac, incomingCode;
    
                if (typeof data === 'string') {
                    try {
                        const parsed = JSON.parse(data);
                        studentID = String(parsed.id).trim();
                        incomingMac = parsed.mac;
                        incomingCode = String(parsed.otp).trim();
                    } catch(e) { studentID = String(data).trim(); }
                } else {
                    studentID = String(data.id).trim();
                    incomingMac = data.mac;
                    incomingCode = String(data.otp).trim();
                }
    
                // فحص كود القاعة
                if (incomingCode !== app.state.currentCode) {
                    return { status: 'error', msg: isEng ? 'Invalid Room Code' : 'كود القاعة خاطئ' };
                }
    
                // البحث عن الطالب
                const year = app.getActiveYear();
                const student = year.students.find(s => String(s.ID).trim() === studentID);
    
                if (!student) {
                    if(window.AndroidBridge) window.AndroidBridge.updateStatus(studentID, 'not_found');
                    return { status: 'error', msg: isEng ? 'Not Registered' : 'غير مسجل' };
                }
    
                // -------------------------------------------------------------
                // 3️⃣ المرحلة الثالثة: كاشف التزوير (الأولوية القصوى) 🛑
                // -------------------------------------------------------------
                const deviceOwner = year.students.find(s => s.DeviceID === incomingMac && String(s.ID).trim() !== studentID);
    
                if (deviceOwner) {
                    if(window.AndroidBridge) window.AndroidBridge.updateStatus(studentID, 'fraud');
    
                    const weekRawCheck = document.getElementById('scan-week').value;
                    const weekCheck = app.attendance.getEffectiveWeek(weekRawCheck, deviceOwner.Group);
                    
                    // تغييب صاحب الجهاز الأصلي في نفس الجلسة المحددة
                    app.attendance.toggle(deviceOwner.ID, weekCheck, 'absent');
    
                    // إنشاء إشعار أمني مترجم
                    this.addNotification({
                        type: 'fraud',
                        studentID: student.ID, studentName: student.Name, group: student.Group,
                        reason: isEng ? 'Device owned by another student' : 'جهاز مملوك لغيره',
                        details: isEng 
                            ? `Device belongs to (${deviceOwner.Name}). Owner marked absent and request rejected.` 
                            : `الجهاز مسجل باسم (${deviceOwner.Name}). تم تغييب المالك ورفض الطلب.`,
                        data: { id: student.ID, partnerID: deviceOwner.ID, week: weekCheck, mac: incomingMac }
                    });
    
                    audioError.play();
                    return { status: 'pending', msg: isEng ? 'Fraud' : 'تزوير' };
                }
    
                // -------------------------------------------------------------
                // 4️⃣ المرحلة الرابعة: الربط الأبدي الآمن (Safe Linking) 🔗
                // -------------------------------------------------------------
                if (!student.DeviceID || student.DeviceID === "" || student.DeviceID === null) {
                    student.DeviceID = incomingMac;
                    await server.request('/api/students/link_device', 'POST', { id: student.ID, mac: incomingMac });
                    app.state.data = await server.request('/api/init');
                }
    
                // -------------------------------------------------------------
                // 5️⃣ المرحلة الخامسة: فحص تغيير الجهاز ⚠️
                // -------------------------------------------------------------
                if (student.DeviceID !== incomingMac) {
                    if(window.AndroidBridge) window.AndroidBridge.updateStatus(studentID, 'wrong_device');
    
                    this.addNotification({
                        type: 'warning',
                        studentID: student.ID, studentName: student.Name, group: student.Group,
                        reason: isEng ? 'Device change attempt' : 'محاولة تغيير جهاز',
                        details: isEng ? 'Student using a new device instead of linked one.' : 'الطالب يستخدم جهازاً جديداً غير جهازه المربوط.',
                        data: { id: student.ID, week: app.state.currentWeek, mac: incomingMac }
                    });
    
                    return { status: 'error', msg: isEng ? 'Different Device' : 'جهاز مختلف' };
                }
    
                // -------------------------------------------------------------
                // 6️⃣ المرحلة السادسة: فحص الزوار والمنطق النهائي
                // -------------------------------------------------------------
                const weekRaw = document.getElementById('scan-week').value;
                const week = app.attendance.getEffectiveWeek(weekRaw, student.Group);
    
                // 🔥 التعديل الجوهري: التأكد من أن الطالب مسجل حضور في "نفس الجلسة" بالتحديد
                const isAlreadyPresent = year.logs.some(l => 
                    l.ID === student.ID && 
                    l.Week === week && 
                    (l.SubSession || "1") === currentSubSession && 
                    l.Status === 'Present'
                );

                if (isAlreadyPresent) {
                    if(window.AndroidBridge) window.AndroidBridge.updateStatus(student.ID, 'present');
                    return { status: 'success', msg: isEng ? 'Already Present' : 'موجود مسبقاً' };
                }
    
                const isGroupMerged = app.state.activeMergeGroups.includes(student.Group);
                if (student.Group !== currentGroup && !isGroupMerged) {
                    if(window.AndroidBridge) window.AndroidBridge.updateStatus(studentID, 'pending_visitor');
                    this.addNotification({
                        type: 'warning',
                        studentID: student.ID, studentName: student.Name, group: student.Group,
                        reason: isEng ? 'Visitor Student' : 'طالب زائر',
                        details: isEng ? `From group (${student.Group})` : `من مجموعة (${student.Group})`,
                        data: { id: student.ID, week, mac: incomingMac }
                    });
                    audioError.play();
                    return { status: 'pending', msg: isEng ? 'Visitor' : 'زائر' };
                }
    
                // ✅ النجاح وتسجيل الحضور في الجلسة المحددة على الشاشة
                app.attendance.markPresent(student, week, incomingMac);
    
                if(document.getElementById('double-check') && document.getElementById('double-check').checked) {
                    const w2Raw = document.getElementById('double-week-select').value;
                    if(w2Raw) {
                        const w2Eff = app.attendance.getEffectiveWeek(w2Raw, student.Group);
                        app.attendance.markPresent(student, w2Eff, incomingMac);
                    }
                }

                if(window.AndroidBridge) window.AndroidBridge.updateStatus(studentID, 'present');
                audioSuccess.play();
                
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000, background: '#1e293b', color: '#fff' });
                Toast.fire({ icon: 'success', title: student.Name });
    
                return { status: 'success' };
    
            } catch (err) {
                console.error("Security Error:", err);
                return { status: 'error' };
            }
        },
    
        // ---------------------------------------------------------
        // دوال إدارة الإشعارات والموافقات
        // ---------------------------------------------------------
    
        async approveRequest(index) {
            const req = app.state.pendingRequests[index];
            const year = app.getActiveYear();
            const student = year.students.find(s => s.ID === req.data.id);
            const isEng = app.lang.current === 'en';
    
            if (student) {
                if (req.reason === 'محاولة تغيير جهاز' || req.reason === 'Device change attempt') {
                    student.DeviceID = req.data.mac;
                    await server.request('/api/students/link_device', 'POST', { id: student.ID, mac: req.data.mac });
                    app.state.data = await server.request('/api/init');
                }
                
                app.attendance.markPresent(student, req.data.week, req.data.mac);
                if(window.AndroidBridge) window.AndroidBridge.updateStatus(student.ID, 'present');
            }
    
            if(req.type === 'fraud' && req.data.partnerID) {
                const partner = year.students.find(p => p.ID === req.data.partnerID);
                if(partner) {
                    app.attendance.markPresent(partner, req.data.week, req.data.mac);
                    if(window.AndroidBridge) window.AndroidBridge.updateStatus(partner.ID, 'present');
                }
            }
    
            app.attendance.renderTable();
            
            let successTitle = isEng ? 'Request Approved' : 'تم القبول';
            if (req.type === 'fraud') successTitle = isEng ? 'Both students marked present' : 'تم تحضير الزميلين';
    
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: successTitle, showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff' });
            this.removeNotification(index);
        },
    
        addNotification(notif) {

                const isEng = app.lang.current === 'en';
                // 🔥 الكود ده بيقرأ اللغة وبيظبط الوقت بدقة: AM/PM للإنجليزية و م/ص للعربية
                notif.time = new Date().toLocaleTimeString(isEng ? 'en-US' : 'ar-EG-u-nu-latn', { hour: '2-digit', minute: '2-digit' });
                
                app.state.pendingRequests.unshift(notif);

                });

        },

                    Swal.fire({ icon: 'success', title: isEng ? 'Reset Successful' : 'تم', text: isEng ? 'Device link has been removed.' : 'تم تصفير الجهاز بنجاح.', background: '#1e293b', color: '#fff', timer: 1500, showConfirmButton: false });
                    app.students.renderTable();
                }

        }
    },
    
    
    
    
        attendance: {
        /**
         * 🚀 تهيئة محرك الحضور المتقدم
         * Initialize the Advanced Attendance Engine
         */
        init() {
            const weekSelect = document.getElementById('scan-week');
            const groupSelect = document.getElementById('scan-group');
            const sessionSelect = document.getElementById('scan-session'); 
            
            if (weekSelect) {
                weekSelect.addEventListener('change', () => {
                    this.updateSessionDropdowns(); 
                    this.syncServerStatusWithWeek(); 
                    this.renderTable();
                });
            }

            if (groupSelect) {
                groupSelect.addEventListener('change', () => {
                    this.handleGroupChange();
                });
            }
            
            if (sessionSelect) {
                sessionSelect.addEventListener('change', () => {
                    this.syncServerStatusWithWeek();
                    this.renderTable();
                });
            }

            this.buildAdvancedMultiSessionUI();
            this.updateSessionDropdowns();
            this.renderTable();
        },

        /**
         * 🛠️ بناء واجهة التحضير المزدوج المتقدم (Multi-Session UI Builder)
         */
        buildAdvancedMultiSessionUI() {
            const doubleBox = document.getElementById('double-week-box');
            if(!doubleBox) return;

            const isEng = document.documentElement.dir === 'ltr';
            
            doubleBox.innerHTML = `
                <div class="flex flex-col gap-2 w-full max-h-[150px] overflow-y-auto custom-scrollbar pr-1" id="multi-session-container">
                    </div>
                <button onclick="app.attendance.addMultiSessionRow()" class="mt-2 w-full bg-slate-800 hover:bg-slate-700 text-blue-400 border border-blue-900/30 border-dashed rounded-xl py-2 text-[10px] font-bold transition flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> ${isEng ? 'Add Target Session' : 'إضافة مسار تحضير إضافي'}
                </button>
            `;
        },

        /**
         * ➕ إضافة صف جديد للتحضير (تم التحديث ليقرأ الجلسات الفعلية ويحدد الحالي تلقائياً)
         */
        addMultiSessionRow() {
            const container = document.getElementById('multi-session-container');
            const isEng = document.documentElement.dir === 'ltr';
            const year = app.getActiveYear();
            const totalW = app.state.totalWeeks || 15;
            
            const currentSelectedWeek = document.getElementById('scan-week').value;
            const currentSelectedSession = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1";
            
            let wOpts = '';
            for(let i=1; i<=totalW; i++) {
                const wVal = `Week ${i}`;
                const isSelected = wVal === currentSelectedWeek ? 'selected' : '';
                wOpts += `<option value="${wVal}" ${isSelected}>${isEng ? 'Week' : 'الأسبوع'} ${i}</option>`;
            }

            // 🔥 التعديل هنا: سحب أقصى عدد جلسات من المجموعات
            let maxSess = parseInt(year.defaultSessions) || 1;
            year.groups.forEach(g => {
                const gLen = g.Sessions && g.Sessions.length > 0 ? g.Sessions.length : maxSess;
                if (gLen > maxSess) maxSess = gLen;
            });
            
            if(year.logs) {
                year.logs.forEach(l => {
                    const s = parseInt(l.SubSession) || 1;
                    if(s > maxSess) maxSess = s;
                });
            }
            
            const totalAvailableOptions = maxSess + 1;

            let sOpts = '';
            for(let i=1; i<=totalAvailableOptions; i++) {
                const isSelected = String(i) === currentSelectedSession ? 'selected' : '';
                const isExtra = i > maxSess;
                const label = isEng ? `Session ${i} ${isExtra ? '(Extra)' : ''}` : `جلسة ${i} ${isExtra ? '(إضافية)' : ''}`;
                sOpts += `<option value="${i}" ${isSelected} ${isExtra ? 'class="text-orange-400 font-bold"' : ''}>${label}</option>`;
            }

            const rowId = 'ms-row-' + Date.now();
            const rowHtml = `
                <div id="${rowId}" class="flex items-center gap-1 bg-slate-950/50 p-1.5 rounded-lg border border-slate-700/50 animate-slide-up">
                    <select class="multi-week-select flex-1 bg-slate-900 text-white border border-slate-700 rounded px-1 py-1.5 text-[9px] outline-none focus:border-blue-500">${wOpts}</select>
                    <select class="multi-sess-select flex-1 bg-slate-900 text-emerald-400 border border-slate-700 rounded px-1 py-1.5 text-[9px] outline-none focus:border-emerald-500">${sOpts}</select>
                    <button onclick="document.getElementById('${rowId}').remove()" class="w-6 h-6 bg-red-500/10 text-red-500 rounded flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-xmark text-[10px]"></i></button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
        },

        /**
         * 🔄 تحديث قائمة الجلسات ديناميكياً (مدمجة + ألوان ذكية للجلسات الإضافية)
         */
        updateSessionDropdowns() {
            const sessionSelect = document.getElementById('scan-session');
            const groupSelect = document.getElementById('scan-group');
            const weekSelect = document.getElementById('scan-week');
            if(!sessionSelect || !groupSelect || !weekSelect) return;

            const year = app.getActiveYear();
            const defSessions = parseInt(year.defaultSessions) || 1;
            const currentGroupVal = groupSelect.value;
            const currentWeekRaw = weekSelect.value;
            
            let maxSess = defSessions;
            let groupConfigMax = defSessions;

            // 1. سحب عدد الجلسات الأساسي من إعدادات المجموعات الفعلية
            if (currentGroupVal === 'All') {
                year.groups.forEach(g => {
                    const gLen = g.Sessions && g.Sessions.length > 0 ? g.Sessions.length : defSessions;
                    if (gLen > maxSess) maxSess = gLen;
                });
                groupConfigMax = maxSess;
            } else {
                const targetGroup = year.groups.find(g => g.Name === currentGroupVal);
                if (targetGroup && targetGroup.Sessions && targetGroup.Sessions.length > 0) {
                    maxSess = targetGroup.Sessions.length;
                    groupConfigMax = maxSess;
                }
            }

            // 2. فحص السجلات للأسبوع المحدد والجروب المحدد فقط
            if (year.logs) {
                year.logs.forEach(l => {
                    const effectiveW = this.getEffectiveWeek(currentWeekRaw, l.Group);
                    // لو السجل ده في نفس الأسبوع اللي إحنا واقفين فيه
                    if (l.Week === effectiveW) {
                        // ولو إحنا مختارين "الكل" أو مختارين جروب السجل ده تحديداً
                        if (currentGroupVal === 'All' || l.Group === currentGroupVal) {
                            const sNum = parseInt(l.SubSession) || 1;
                            if (sNum > maxSess) maxSess = sNum; // ارفع سقف الجلسات المسجلة
                        }
                    }
                });
            }

            const totalAvailableOptions = maxSess + 1; // دايماً سيب واحدة إضافية للطوارئ
            const isEng = document.documentElement.dir === 'ltr';
            const currentVal = sessionSelect.value; 
            
            let opts = '';
            for(let i=1; i<=totalAvailableOptions; i++) {
                const isExtra = i > groupConfigMax;
                let colorClass = '';
                
                // 🔥 المنطق الذكي للألوان 🔥
                if (isExtra) {
                    if (i <= maxSess) {
                        // جلسة إضافية ومسجل فيها حضور فعلياً -> أصفر
                        colorClass = 'class="text-yellow-400 font-bold"';
                    } else {
                        // جلسة إضافية جديدة لسه فاضية -> برتقالي
                        colorClass = 'class="text-orange-500 font-bold"';
                    }
                }

                const label = isEng ? `Session ${i} ${isExtra ? '(Extra)' : ''}` : `جلسة ${i} ${isExtra ? '(إضافية)' : ''}`;
                opts += `<option value="${i}" ${colorClass}>${label}</option>`;
            }

            sessionSelect.innerHTML = opts;
            
            // استرجاع الاختيار لو كان لسه متاح، غير كده ارجع لجلسة 1
            if (currentVal && parseInt(currentVal) <= totalAvailableOptions) {
                sessionSelect.value = currentVal;
            } else {
                sessionSelect.value = "1";
            }
        },

        syncServerStatusWithWeek() {
            if (!window.AndroidBridge) return;
            if (window.AndroidBridge.clearAllStatuses) window.AndroidBridge.clearAllStatuses();
            
            const weekRaw = document.getElementById('scan-week').value;
            const currentSessionGroup = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1";
            const year = app.getActiveYear();
    
            const logs = year.logs.filter(l => l.Week === this.getEffectiveWeek(weekRaw, l.Group) && (l.SubSession || "1") === currentSessionGroup);
            logs.forEach(log => window.AndroidBridge.updateStatus(log.ID, 'present'));
        },
    
        getEffectiveWeek(w, group) {
            const year = app.getActiveYear();
            const groupMap = year.weekMapping && year.weekMapping[group] ? year.weekMapping[group][w] : null;
            const globalMap = year.weekMapping && year.weekMapping['global'] ? year.weekMapping['global'][w] : null;
            return groupMap || globalMap || w;
        },
    
        isHoliday(w, group) {
            const year = app.getActiveYear();
            const groupHols = year.holidays && year.holidays[group] ? year.holidays[group] : [];
            const globalHols = year.holidays && year.holidays['global'] ? year.holidays['global'] : [];
            return groupHols.includes(w) || globalHols.includes(w);
        },

        /**
      /**
         * 🎯 تسجيل الحضور المتقدم (يدعم الجلسات المتعددة + التحديث اللحظي للقوائم)
         */
        async markPresent(student, week, mac) {
            const currentSessionGroup = document.getElementById('scan-group').value; 
            const primarySubSession = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1"; 
            
            // تحديد السكشن الفعلي عشان لو الدكتور مختار "الكل" من القائمة
            const actualSessionGroup = currentSessionGroup === 'All' ? student.Group : currentSessionGroup;

            // 1. تسجيل الجلسة الأساسية (عبر السيرفر مباشرة لضمان الحفظ القطعي)
            await this._executeLogSave(student, week, primarySubSession, actualSessionGroup, mac);

            // 2. فحص التحضير المتعدد (Double Check-in)
            const doubleCheckBtn = document.getElementById('double-check');
            if (doubleCheckBtn && doubleCheckBtn.checked) {
                const weekSelects = document.querySelectorAll('.multi-week-select');
                const sessSelects = document.querySelectorAll('.multi-sess-select');
                
                for (let i = 0; i < weekSelects.length; i++) {
                    const targetW = weekSelects[i].value;
                    const targetS = sessSelects[i].value;
                    
                    if (targetW && targetS) {
                        const effectiveTargetW = this.getEffectiveWeek(targetW, student.Group);
                        await this._executeLogSave(student, effectiveTargetW, targetS, actualSessionGroup, mac);
                    }
                }
            }

            // لا نحتاج لـ server.save() هنا لأن الدالة المساعدة تقوم بالواجب.
            
            // 🔥 3. تحديث الذاكرة فوراً لضمان دقة البيانات
            app.state.data = await server.request('/api/init'); 
            
            // 🔥 4. التحديث اللحظي: تحديث قائمة الجلسات فوراً لإظهار الجلسة الإضافية في القائمة العلوية
            this.updateSessionDropdowns(); 
            this.renderTable();
            
            // 5. تحديث الرادار لو كان مفتوح
            if (app.radar && app.radar.isOpen) {
                app.radar.updateData();
            }
        
            return { status: 'success' };
        },

        /**
         * 🔐 دالة مساعدة للحفظ (ترسل للسيرفر لضمان حفظ الجلسات المتعددة بدقة وحماية الأجهزة من التزوير)
         */
        async _executeLogSave(student, week, subSession, sessionGroup, mac) {
            // 🔥 الإصلاح الجذري: الاعتماد على الـ API الخاص بالسيرفر بدلاً من الذاكرة المؤقتة
            await server.request('/api/scan', 'POST', {
                id: student.ID,
                week: week,
                status: 'Present',
                sessionGroup: sessionGroup,
                subSession: String(subSession),
                deviceID: mac,
                rssi: -40
            });
            
            // الربط الأبدي الآمن للجهاز الجديد لو الطالب ملوش جهاز
            if (mac && !student.DeviceID) {
                const year = app.getActiveYear();
                const deviceOwner = year.students.find(s => s.DeviceID === mac && s.ID !== student.ID);
                if (!deviceOwner) {
                    await server.request('/api/students/link_device', 'POST', { id: student.ID, mac: mac });
                }
            }
        },
    
        handleGroupChange() {
            const newGroup = document.getElementById('scan-group').value;
            
            if (app.state.groupMerges && app.state.groupMerges[newGroup]) {
                app.state.activeMergeGroups = [...app.state.groupMerges[newGroup]];
            } else {
                app.state.activeMergeGroups = []; 
            }
            
            // 🔥 الإضافة السحرية هنا: تحديث قائمة الجلسات لتطابق المجموعة المختارة فوراً
            this.updateSessionDropdowns(); 
            this.renderTable();
        },
    
        openMergeModal() {
            const currentMainGroup = document.getElementById('scan-group').value;
            const year = app.getActiveYear();
            const listContainer = document.getElementById('merge-list');
            let currentlyLinked = [];
            
            if (currentMainGroup !== 'All') {
                currentlyLinked.push(currentMainGroup);
                if (app.state.activeMergeGroups) currentlyLinked.push(...app.state.activeMergeGroups);
            }
    
            if(year.groups.length > 0) {
                listContainer.innerHTML = year.groups.map(g => {
                    const isChecked = currentlyLinked.includes(g.Name) ? 'checked' : '';
                    return `<label class="merge-item">
                        <span class="text-white text-sm font-bold">${g.Name}</span>
                        <input type="checkbox" value="${g.Name}" class="merge-chk w-5 h-5 rounded bg-slate-950 border-slate-600 accent-blue-600" ${isChecked}>
                    </label>`;
                }).join('');
            } else {
                const isEng = document.documentElement.dir === 'ltr';
                listContainer.innerHTML = `<p class="text-center text-slate-500 text-xs">${isEng ? 'No groups to merge' : 'لا توجد مجموعات للدمج'}</p>`;
            }
            app.ui.openModal('modal-merge');
        },
    
        applyMerge() {
            const selected = Array.from(document.querySelectorAll('.merge-chk:checked')).map(c => c.value);
            if (!app.state.groupMerges) app.state.groupMerges = {};
            const currentMainGroup = document.getElementById('scan-group').value;
            
            let oldCluster = [];
            if (currentMainGroup !== 'All') oldCluster = [currentMainGroup, ...(app.state.groupMerges[currentMainGroup] || [])];
            
            oldCluster.forEach(g => {
                delete app.state.groupMerges[g]; 
                for (let other in app.state.groupMerges) {
                    app.state.groupMerges[other] = app.state.groupMerges[other].filter(x => x !== g);
                }
            });
    
            if (selected.length === 0) {
                document.getElementById('scan-group').value = 'All';
                app.state.activeMergeGroups = [];
            } else {
                const mainGroup = selected[0];
                const others = selected.slice(1);
                document.getElementById('scan-group').value = mainGroup;
                app.state.activeMergeGroups = others;
                selected.forEach(g => app.state.groupMerges[g] = selected.filter(x => x !== g));
            }
            app.ui.closeModal('modal-merge');
            this.renderTable();
        },
    
        autoSelectGroup(isSilent = false) {
            const select = document.getElementById('scan-group');
            if (!select) return;
            const IDLE_TIMEOUT_MS = 15 * 60 * 1000;
            const timeSinceLastScan = Date.now() - (app.state.lastScanTime || 0);
            if (app.state.lastScanTime > 0 && timeSinceLastScan < IDLE_TIMEOUT_MS) return;
    
            const year = app.getActiveYear();
            const now = new Date();
            const daysMap = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const currentDayName = daysMap[now.getDay()];
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            const SESSION_DURATION = 150;
    
            const matchingGroup = year.groups.find(g => {
                if(g.Sessions && g.Sessions.length > 0) {
                    return g.Sessions.some(sess => {
                        if(sess.Day !== currentDayName || !sess.Time) return false;
                        const [h, m] = sess.Time.split(':').map(Number);
                        const startMinutes = h * 60 + m;
                        return currentMinutes >= (startMinutes - 15) && currentMinutes < (startMinutes + SESSION_DURATION);
                    });
                }
                if (g.Day !== currentDayName || !g.Time) return false;
                const [h, m] = g.Time.split(':').map(Number);
                const startMinutes = h * 60 + m;
                return currentMinutes >= (startMinutes - 15) && currentMinutes < (startMinutes + SESSION_DURATION);
            });
    
            if (matchingGroup) {
                if (select.value !== matchingGroup.Name) {
                    select.value = matchingGroup.Name;
                    app.state.activeMergeGroups = []; 
                    this.renderTable();
                }
            } else {
                if (select.value !== 'All') {
                    select.value = 'All';
                    app.state.activeMergeGroups = []; 
                    this.renderTable();
                }
            }
        },

        toggleHoliday() {
            const w = document.getElementById('scan-week').value;
            const g = document.getElementById('scan-group').value;
            const isEng = document.documentElement.dir === 'ltr';
    
            if(g === 'All' || !g) return Swal.fire({text: isEng ? 'Select a group first or apply globally' : 'يرجى تحديد مجموعة لتسجيل إجازة خاصة، أو اختر للجميع', icon:'info', background:'#1e293b', color:'#fff'});
    
            const year = app.getActiveYear();
            const globalHols = year.holidays && year.holidays['global'] ? year.holidays['global'] : [];
            const groupHols = year.holidays && year.holidays[g] ? year.holidays[g] : [];
            const isGlobal = globalHols.includes(w);
            const isLocal = groupHols.includes(w);
    
            if (isGlobal || isLocal) {
                Swal.fire({
                    title: isEng ? `Cancel Holiday for ${w}?` : `إلغاء إجازة ${w}؟`,
                    icon: 'question', showCancelButton: true, confirmButtonText: isEng?'Yes':'نعم', confirmButtonColor: '#10b981', cancelButtonText: isEng?'Cancel':'تراجع', background: '#1e293b', color: '#fff'
                }).then(async r => {
                    if (r.isConfirmed) {
                        const scope = isGlobal ? 'global' : g;
                        await server.request('/api/settings/save', 'POST', { holiday: true, scope: scope, week: w, remove: true });
                        app.state.data = await server.request('/api/init');
                        this.renderTable();
                        Swal.fire({icon:'success', title: isEng?'Resumed':'تم استئناف الدراسة', toast:true, position:'top-end', showConfirmButton:false, timer:1500, background:'#1e293b', color:'#fff'});
                    }
                });
                return;
            }
    
            Swal.fire({
                title: isEng ? `Mark ${w} as Holiday?` : `تسجيل ${w} كإجازة؟`,
                showDenyButton: true, showCancelButton: true,
                confirmButtonText: isEng ? `Only ${g}` : `فقط لـ ${g}`,
                denyButtonText: isEng ? `Global` : `للجميع`,
                cancelButtonText: isEng ? `Cancel` : `إلغاء`,
                background:'#1e293b', color:'#fff', confirmButtonColor: '#3b82f6', denyButtonColor: '#ef4444'
            }).then(async r => {
                let targetScope = null;
                if(r.isConfirmed) targetScope = g;
                else if(r.isDenied) targetScope = 'global';
        
                if(targetScope) {
                    await server.request('/api/settings/save', 'POST', {holiday: true, scope: targetScope, week: w});
                    app.state.data = await server.request('/api/init');
                    this.renderTable();
                    Swal.fire({icon:'success', title: isEng?'Saved':'تم تسجيل الإجازة', toast:true, position:'top-end', showConfirmButton:false, timer:1500, background:'#1e293b', color:'#fff'});
                }
            });
        },
    
        /**
         * 🖼️ توليد كارت الطالب (يظهر الجلسة الحالية + كل الجلسات التي حضرها هذا الأسبوع)
         */
        getStudentCardHTML(s, logsArr, week, isVisitor) {
            const sDir = app.ui.getDir(s.Name);
            const isEng = document.documentElement.dir === 'ltr';
            
            const currentSubSession = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1";
            const isPresentInCurrentSession = logsArr && logsArr.some(l => (l.SubSession || "1") === currentSubSession);
            
            let sessionBadges = '';
            if(logsArr && logsArr.length > 0) {
                const uniqueSessions = [...new Set(logsArr.map(l => l.SubSession || '1'))].sort();
                sessionBadges = uniqueSessions.map(sessNum => 
                    `<span class="text-[9px] font-bold text-white bg-blue-600 px-1.5 py-0.5 rounded shadow whitespace-nowrap shrink-0">${isEng?'S':'ج'}${sessNum}</span>`
                ).join(' ');
            }

            return `
            <div id="card-${s.ID}" class="bg-slate-800 p-3 rounded-xl border ${isPresentInCurrentSession ? 'border-emerald-500/30 bg-emerald-900/10' : 'border-slate-700'} flex items-center gap-3 transition-all shadow-sm relative overflow-hidden group" style="direction: ${sDir}">
                <div class="w-9 h-9 rounded-full ${isPresentInCurrentSession ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-400'} flex items-center justify-center text-xs font-bold transition-colors shadow-inner shrink-0 border border-slate-700/50">
                    ${isPresentInCurrentSession ? '<i class="fa-solid fa-check"></i>' : s.Name.charAt(0)}
                </div>
                <div class="flex-1 min-w-0" style="text-align: ${sDir === 'rtl' ? 'right' : 'left'}">
                    <p class="text-white text-sm font-bold truncate block w-full">${s.Name}</p>
                    <div class="flex items-center gap-1.5 mt-0.5 overflow-hidden flex-wrap" style="justify-content: ${sDir === 'rtl' ? 'flex-end' : 'flex-start'}; direction: ltr;">
                        ${sessionBadges}
                        ${isVisitor ? `<span class="badge badge-visitor shrink-0">${isEng?'Visitor':'زائر'}</span>` : ''}
                        <p class="text-[10px] text-slate-400 font-mono truncate w-full sm:w-auto">${s.ID} | ${s.Group || (isEng?'Ungrouped':'بدون مجموعة')}</p>
                    </div>
                </div>
                <div class="shrink-0 flex gap-2" style="direction: ltr;">
                    <button onclick="app.attendance.toggle('${s.ID}', '${week}', '${isPresentInCurrentSession ? 'absent' : 'present'}')" 
                            class="w-8 h-8 rounded-lg ${isPresentInCurrentSession ? 'bg-red-500/10 text-red-400 hover:bg-red-500' : 'bg-blue-600 text-white hover:bg-blue-500'} text-xs font-bold transition flex items-center justify-center">
                        <i class="fa-solid ${isPresentInCurrentSession ? 'fa-xmark' : 'fa-check'}"></i>
                    </button>
                </div>
            </div>`;
        },
    
        renderTable() {
            const group = document.getElementById('scan-group').value;
            app.state.currentMainGroup = group;
            const weekRaw = document.getElementById('scan-week').value;
            const week = this.getEffectiveWeek(weekRaw, group);
            const currentSubSession = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1"; 
            const container = document.getElementById('att-list-container');
            const year = app.getActiveYear();
            const isEng = document.documentElement.dir === 'ltr';

            const weekLogs = year.logs.filter(l => l.Week === week);
            const sessionLogs = weekLogs.filter(l => (l.SubSession || "1") === currentSubSession);
            const sessionLogsMap = new Set(sessionLogs.map(l => l.ID));
            let pCount = 0;

            document.getElementById('merge-badges').innerHTML = app.state.activeMergeGroups.map(g => `<span class="badge badge-primary">${g}</span>`).join('');

            if (window.AndroidBridge && window.AndroidBridge.syncStats) {
                try {
                    const statsObj = {};
                    const allLogsSet = new Set(year.logs.map(l => l.ID + '_' + l.Week));
                    year.students.forEach(s => {
                        let sp = 0, sa = 0; let hist = [];
                        for(let i = 1; i <= (app.state.totalWeeks||15); i++) {
                            const w = `Week ${i}`;
                            const isHol = this.isHoliday(w, s.Group);
                            const effW = this.getEffectiveWeek(w, s.Group);
                            const isPres = allLogsSet.has(s.ID + '_' + effW);
                            if (!isHol) { if (isPres) sp++; else sa++; }
                            hist.push(isHol ? 'H' : (isPres ? 'P' : 'A'));
                        }
                        statsObj[s.ID] = { p: sp, a: sa, history: hist };
                    });
                    window.AndroidBridge.syncStats(JSON.stringify(statsObj));
                } catch(e) {}
            }

            if (window.AndroidBridge && window.AndroidBridge.syncStudents) {
                window.AndroidBridge.syncStudents(JSON.stringify(year.students.map(s => ({name: s.Name.trim(), id: String(s.ID).trim()}))));
            }

            if(group === 'All' || !group) {
                const displayItems = sessionLogs.slice().reverse().slice(0, 50);
                pCount = sessionLogs.length;

                document.getElementById('feed-title').innerText = isEng ? `Live Log (Session ${currentSubSession})` : `سجل الحضور (جلسة ${currentSubSession})`;
                document.getElementById('stat-present').innerText = pCount;
                document.getElementById('stat-absent').innerText = '-';

                if(displayItems.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-slate-500 flex flex-col items-center"><div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4"><i class="fa-solid fa-users-viewfinder text-3xl opacity-50"></i></div><p class="text-sm font-bold text-white mb-1">${isEng?'Select Session First':'حدد السكشن أولاً'}</p></div>`;
                } else {
                    container.innerHTML = displayItems.map(l => `<div class="bg-slate-800 p-3 rounded-xl border border-slate-700 flex items-center gap-3 animate-fade-in shadow-sm"><div class="w-8 h-8 rounded-full bg-emerald-500/10 text-emerald-500 flex items-center justify-center text-xs font-bold border border-emerald-500/20 shrink-0"><i class="fa-solid fa-check"></i></div><div class="flex-1 min-w-0"><p class="text-white text-sm font-bold truncate">${l.Name}</p><p class="text-[10px] text-slate-400 font-mono truncate">${l.Time} | ${l.Group} (${isEng?'S':'ج'}${l.SubSession||1})</p></div><span class="badge badge-success shrink-0">${isEng?'Done':'تم'}</span></div>`).join('');
                }
            } else {
                let targetGroups = [...new Set([group, ...app.state.activeMergeGroups])].sort();
                
                let titleBase = (targetGroups.length >= year.groups.length && year.groups.length > 0) ? (isEng?"All Groups":"الجميع") : targetGroups.join(' + ');
                document.getElementById('feed-title').innerText = isEng ? `${titleBase} (S${currentSubSession})` : `${titleBase} (جلسة ${currentSubSession})`;

                const enrolledStudents = year.students.filter(s => targetGroups.includes(s.Group.trim()));
                const visitorsIDs = sessionLogs.filter(l => !enrolledStudents.some(s => s.ID === l.ID) && targetGroups.includes(l.SessionGroup)).map(l => l.ID);
                const visitorStudents = year.students.filter(s => visitorsIDs.includes(s.ID));
                const allToDisplay = [...enrolledStudents, ...visitorStudents].sort((a,b) => a.Name.localeCompare(b.Name, 'ar'));

                if(this.isHoliday(weekRaw, group)) {
                    container.innerHTML = `<div class="text-center py-20 flex flex-col items-center justify-center h-full"><div class="w-16 h-16 rounded-full bg-red-500/10 text-red-500 mb-4 flex items-center justify-center border border-red-500/20"><i class="fa-solid fa-mug-hot text-3xl"></i></div><p class="text-red-400 font-bold text-lg">${isEng?'Public Holiday':'إجازة رسمية هذا الأسبوع'}</p></div>`;
                    document.getElementById('stat-present').innerText = '-';
                    document.getElementById('stat-absent').innerText = '-';
                    return;
                }

                container.innerHTML = allToDisplay.map(s => {
                    if(sessionLogsMap.has(s.ID)) pCount++;
                    const studentAllWeekLogs = weekLogs.filter(l => l.ID === s.ID);
                    const isVisitor = !targetGroups.includes(s.Group.trim());
                    return this.getStudentCardHTML(s, studentAllWeekLogs, week, isVisitor);
                }).join('');

                document.getElementById('stat-present').innerText = pCount;
                document.getElementById('stat-absent').innerText = enrolledStudents.length - (sessionLogs.filter(l => enrolledStudents.some(es => es.ID === l.ID)).length);
            }
        },

        /**
         * ⚡ التبديل اليدوي المتقدم (يتحكم في الجلسات الأساسية والإضافية)
         */
        async toggle(id, week, action) {
            app.state.lastScanTime = Date.now();
        
            let currentSessionGroup = document.getElementById('scan-group').value;
            const primarySubSession = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1"; 
            
            const year = app.getActiveYear();
            const student = year.students.find(s => s.ID === id);
        
            if (currentSessionGroup === 'All') {
                currentSessionGroup = student ? student.Group : null;
            }
        
            if (action === 'present') {
                await server.request('/api/scan', 'POST', {
                    id, 
                    week, 
                    status: 'Present', 
                    sessionGroup: currentSessionGroup,
                    subSession: primarySubSession
                });

                const doubleCheckBtn = document.getElementById('double-check');
                if(doubleCheckBtn && doubleCheckBtn.checked) {
                    const w2Raw = document.getElementById('double-week-select').value;
                    if(w2Raw) {
                        const w2Eff = this.getEffectiveWeek(w2Raw, student ? student.Group : 'All');
                        await server.request('/api/scan', 'POST', {
                            id, week: w2Eff, status: 'Present', sessionGroup: currentSessionGroup, subSession: primarySubSession
                        });
                    }
                }
            } else {
                await server.request('/api/scan/delete', 'POST', { id, week, subSession: primarySubSession });
            }
        
            app.state.data = await server.request('/api/init');
        
            if (window.AndroidBridge) {
                const statusToSend = (action === 'present') ? 'present' : 'cancelled';
                window.AndroidBridge.updateStatus(id, statusToSend);
            }
            
            // 🔥 التحديث اللحظي: تحديث القائمة فوراً
            this.updateSessionDropdowns(); 

            if (student) {
                const domGroup = document.getElementById('scan-group').value;
                if (domGroup === 'All' || !domGroup) {
                    this.renderTable();
                } else {
                    const hasLog = (action === 'present');
                    const isVisitor = student.Group !== domGroup;
                    const studentAllWeekLogs = app.state.data.years.find(y => y.id === app.state.data.activeYearId).logs.filter(l => l.ID === student.ID && l.Week === week);
                    
                    const newHTML = this.getStudentCardHTML(student, studentAllWeekLogs, week, isVisitor);
                    const oldCard = document.getElementById(`card-${id}`);
        
                    if (oldCard) {
                        oldCard.outerHTML = newHTML;
                    } else {
                        this.renderTable(); 
                    }
                }
            }
        
            const pEl = document.getElementById('stat-present');
            const aEl = document.getElementById('stat-absent');
            if (pEl && pEl.innerText !== '-') {
                let pVal = parseInt(pEl.innerText) || 0;
                let aVal = parseInt(aEl.innerText) || 0;
                if (action === 'present') {
                    pVal++; aVal = Math.max(0, aVal - 1);
                } else {
                    pVal = Math.max(0, pVal - 1); aVal++;
                }
                pEl.innerText = pVal;
                aEl.innerText = aVal;
            }
        
            const manualModal = document.getElementById('modal-manual');
            if (manualModal && !manualModal.classList.contains('hidden')) {
                this.filterManualSearch();
            }
        },
