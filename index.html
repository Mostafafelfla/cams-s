        // --- إعدادات الكاميرا المدمجة (APK Safe) ---
        startCamera() {
            if (app.state.isStartingCamera) return;
            const group = document.getElementById('scan-group').value;
            if (group === 'All' || !group) {
                Swal.fire({icon: 'warning', text: document.documentElement.dir === 'ltr' ? 'Select group first' : 'اختر مجموعة أولاً', background: '#1e293b', color: '#fff'});
                return;
            }
            app.state.isStartingCamera = true; 
            this.safeStopCamera().then(() => {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    stream.getTracks().forEach(track => track.stop());
                    this.initLibrary(); 
                })
                .catch(err => {
                    app.state.isStartingCamera = false;
                    Swal.fire({ icon: 'error', title: 'Camera Blocked', text: 'Please allow camera permission.', background: '#1e293b', color: '#fff' });
                });
            });
        },
        safeStopCamera() {
            return new Promise((resolve) => {
                if (app.state.camera) {
                    try {
                        const state = app.state.camera.getState();
                        if (state === 2 || state === 3) {
                            app.state.camera.stop().then(() => { app.state.camera.clear(); app.state.camera = null; resolve(); }).catch(() => { app.state.camera.clear(); app.state.camera = null; resolve(); });
                        } else { app.state.camera.clear(); app.state.camera = null; resolve(); }
                    } catch(e) { app.state.camera = null; resolve(); }
                } else resolve();
            });
        },
        initLibrary() {
            try { app.state.camera = new Html5Qrcode("reader"); } catch (e) { app.state.isStartingCamera = false; return; }
            document.getElementById('cam-placeholder').classList.add('hidden');
            document.getElementById('stop-btn').classList.remove('hidden');
            const tb = document.getElementById('torch-btn'); if(tb) tb.classList.remove('hidden');
            const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0, disableFlip: false };
            app.state.camera.start({ facingMode: "environment" }, config, (dt) => this.handleScan(dt), (em) => {}).then(() => { app.state.isStartingCamera = false; }).catch(err => { app.state.isStartingCamera = false; this.cleanupCameraUI(); Swal.fire({ icon: 'error', text: 'فشل تشغيل الكاميرا.', background: '#1e293b', color: '#fff' }); });
        },
        stopCamera() { this.safeStopCamera().then(() => this.cleanupCameraUI()); },
        cleanupCameraUI() {
            const ph = document.getElementById('cam-placeholder'), sb = document.getElementById('stop-btn'), tb = document.getElementById('torch-btn');
            if(ph) ph.classList.remove('hidden'); if(sb) sb.classList.add('hidden'); if(tb) tb.classList.add('hidden');
        },
        toggleTorch() { if(app.state.camera && app.state.camera.getState() === 2) { try { app.state.camera.applyVideoConstraints({ advanced: [{ torch: true }] }); } catch(e){} } },
        
        async handleScan(scannedData) {
            app.state.lastScanTime = Date.now();
            if (app.state.lastScannedCode === scannedData || app.state.isProcessing) return;
            app.state.isProcessing = true;
            
            const weekRaw = document.getElementById('scan-week').value;
            const group = document.getElementById('scan-group').value; 
            const year = app.getActiveYear();
            
            let code = scannedData, incomingDeviceId = null, originalId = null;
            if (scannedData.includes('|')) { const parts = scannedData.split('|'); code = parts[0]; incomingDeviceId = parts[1]; originalId = parts[2]; }
            const student = year.students.find(s => String(s.ID).trim() === String(code).trim());
            const setCooldownAndUnlock = () => { app.state.lastScannedCode = scannedData; app.state.isProcessing = false; setTimeout(() => { app.state.lastScannedCode = null; }, 2000); };
            
            if(!student) { audioError.play(); if (navigator.vibrate) navigator.vibrate([100, 50, 100]); Swal.fire({ toast: true, position: 'top', icon: 'error', title: 'كود غير معروف', showConfirmButton: false, timer: 1500, background:'#b91c1c', color:'#fff' }); setCooldownAndUnlock(); return; }
            
            const effectiveWeek = this.getEffectiveWeek(weekRaw, student.Group);
            const currentSubSession = document.getElementById('scan-session') ? document.getElementById('scan-session').value : "1";
            const isAlreadyLogged = year.logs.some(l => l.ID === code && l.Week === effectiveWeek && (l.SubSession||"1") === currentSubSession);
            
            if (isAlreadyLogged) { audioError.play(); if (navigator.vibrate) navigator.vibrate(200); Swal.fire({ toast: true, position: 'top', icon: 'info', title: 'مسجل بالفعل', text: student.Name, showConfirmButton: false, timer: 1500, background:'#1e293b', color:'#60a5fa' }); setCooldownAndUnlock(); return; }
            
            let isMaliciousFraud = false, isDeviceChange = false, fraudReason = "", originalStudentName = "مجهول", originalStudentObj = null;
            if (originalId && String(originalId).trim() !== String(code).trim()) { isMaliciousFraud = true; fraudReason = "تغيير ID في التطبيق"; originalStudentObj = year.students.find(s => String(s.ID).trim() === String(originalId).trim()); if (originalStudentObj) originalStudentName = originalStudentObj.Name; }
            if (!isMaliciousFraud && incomingDeviceId) { const otherStudent = year.students.find(s => s.DeviceID === incomingDeviceId && String(s.ID).trim() !== String(code).trim()); if (otherStudent) { isMaliciousFraud = true; fraudReason = `هاتف مسجل باسم (${otherStudent.Name})`; originalStudentName = otherStudent.Name; originalStudentObj = otherStudent; } else if (student.DeviceID && student.DeviceID !== incomingDeviceId) { isDeviceChange = true; } }
            
            if (isMaliciousFraud) {
                audioError.play(); if(app.state.camera) app.state.camera.pause(); if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
                const swalResult = await Swal.fire({ title: '🚨 محاولة غش/تزوير!', html: `الطالب <b>${student.Name}</b> يستخدم هاتف <b>${originalStudentName}</b>.<br><span class="text-red-400 font-bold">${fraudReason}</span>`, icon: 'error', showDenyButton: true, showCancelButton: true, confirmButtonText: 'حضرهم الاتنين ✔️', denyButtonText: 'غيبهم الاتنين ❌', cancelButtonText: 'إلغاء ', background: '#1e293b', color: '#fff', confirmButtonColor: '#10b981', denyButtonColor: '#ef4444' });
                if (swalResult.isConfirmed && originalStudentObj) { const origAlreadyLogged = year.logs.some(l => l.ID === originalStudentObj.ID && l.Week === effectiveWeek && (l.SubSession||"1")===currentSubSession); if (!origAlreadyLogged) await this._executeLogSave(year, originalStudentObj, effectiveWeek, currentSubSession, group === 'All' ? originalStudentObj.Group : group, incomingDeviceId); } 
                else if (swalResult.isDenied && originalStudentObj) { await server.request('/api/scan/delete', 'POST', { id: originalStudentObj.ID, week: effectiveWeek, subSession: currentSubSession }); }
                app.state.data = await server.request('/api/init'); this.renderTable();
                if(app.state.camera) app.state.camera.resume(); setCooldownAndUnlock(); return; 
            }
            if (isDeviceChange && !isMaliciousFraud) {
                audioError.play(); if(app.state.camera) app.state.camera.pause(); if (navigator.vibrate) navigator.vibrate([150, 150]);
                const swalResult = await Swal.fire({ title: '📱 هاتف جديد', html: `الطالب <b>${student.Name}</b> يستخدم هاتفاً غير المربوط.`, icon: 'warning', showDenyButton: true, showCancelButton: true, confirmButtonText: 'تحضير واعتماد', denyButtonText: 'تحضير استثنائي', cancelButtonText: 'إلغاء', background: '#1e293b', color: '#fff', confirmButtonColor: '#10b981', denyButtonColor: '#3b82f6', cancelButtonColor: '#ef4444' });
                if (swalResult.isConfirmed) { await server.request('/api/bind_device', 'POST', { id: code, deviceID: incomingDeviceId }); student.DeviceID = incomingDeviceId; } 
                else if (!swalResult.isDenied) { if(app.state.camera) app.state.camera.resume(); setCooldownAndUnlock(); return; }
                if(app.state.camera) app.state.camera.resume();
            }
            
            const validGroups = group === 'All' ? null : [group, ...app.state.activeMergeGroups];
            if(validGroups && !validGroups.includes(student.Group)) {
                audioError.play(); if(app.state.camera) app.state.camera.pause(); 
                const conf = await Swal.fire({ title: 'طالب زائر', text: `الطالب ${student.Name} من مجموعة (${student.Group}). تحضيره كزائر؟`, icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم', cancelButtonText: 'إلغاء', background: '#1e293b', color: '#fff' });
                if(!conf.isConfirmed) { if(app.state.camera) app.state.camera.resume(); setCooldownAndUnlock(); return; }
                if(app.state.camera) app.state.camera.resume();
            }
            audioSuccess.play(); if (navigator.vibrate) navigator.vibrate(50);
            
            // تنفيذ التحضير الرئيسي ثم تمرير الـ MAC
            await this.markPresent(student, effectiveWeek, incomingDeviceId);
            
            document.getElementById('scanned-name').innerText = student.Name;
            document.getElementById('scanned-info').innerText = `${student.ID} | ${student.Group}`;
            const ov = document.getElementById('scan-success-overlay'); ov.classList.remove('hidden'); setTimeout(() => { ov.classList.add('hidden'); }, 800);
            setCooldownAndUnlock(); 
        }
    },

   importExcel(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            const isEng = app.lang.current === 'en'; // فحص اللغة الحالية
            
            reader.onload = async (e) => {
                try {
                    // إظهار رسالة تحميل
                    Swal.fire({
                        title: isEng ? 'Processing Data...' : 'جاري التحليل والرفع...', 
                        allowOutsideClick: false, 
                        background: '#1e293b', 
                        color: '#fff', 
                        didOpen: () => Swal.showLoading()
                    });

                    const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});

                    if (rows.length < 2) throw new Error(isEng ? "Empty File" : "الملف فارغ");

                    // البحث عن صف العناوين (لتخطي أي صفوف فارغة في بداية الشيت)
                    let headerRowIndex = 0;
                    let headers = [];
                    for(let i=0; i<rows.length; i++) {
                        if(rows[i] && rows[i].length >= 2) { 
                            headers = rows[i];
                            headerRowIndex = i;
                            break;
                        }
                    }

                    const weekColumns = {}; // قاموس لحفظ أرقام أعمدة الأسابيع
                    let groupColIndex = -1; 

                    // 1. تحليل العناوين (Headers) بذكاء
                    headers.forEach((header, index) => {
                        if (typeof header === 'string') {
                            const h = header.toLowerCase().trim();
                            // التقاط w1, w 2, week 3, Week4, الاسبوع 1
                            const match = h.match(/^(w|week|الاسبوع|أسبوع)\s*(\d+)$/i);
                            if (match) {
                                weekColumns[index] = `Week ${match[2]}`;
                            }
                            if (h.includes('group') || h.includes('سكشن') || h.includes('مجموعة')) {
                                groupColIndex = index;
                            }
                        }
                    });

                    // لو مفيش عمود صريح للسكشن، افترض إنه العمود الثالث (رقم 2)
                    if (groupColIndex === -1) groupColIndex = 2; 

                    const payload = { students: [], logs: [], newGroups: [] };
                    let stdCount = 0;
                    let logsCount = 0;
                    let currentSectionTracker = 'General'; // المتعقب الذكي للسكاشن (الفواصل)

                    // 2. تحليل الصفوف بذكاء (طلاب + فواصل السكاشن + الغياب والحضور)
                    for(let i = headerRowIndex + 1; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r || r.length === 0) continue; // تخطي الصفوف الفارغة تماماً

                        const col0 = r[0] ? String(r[0]).trim() : '';
                        const col1 = r[1] ? String(r[1]).trim() : '';

                        // 🔥 كاشف فواصل السكاشن (Section Dividers) 🔥
                        // لو الخلية الأولى مفيهاش رقم (ليست ID)، وفيها نص، اعتبرها عنوان سكشن!
                        const isCol0Numeric = /^\d+$/.test(col0);
                        
                        if (!isCol0Numeric && col0 !== '' && col1 === '') {
                            currentSectionTracker = col0; // تحديث المتعقب
                            if(!payload.newGroups.includes(currentSectionTracker)) payload.newGroups.push(currentSectionTracker);
                            continue; // اذهب للصف التالي
                        } else if (col0 === '' && col1 !== '' && r.length <= 2) {
                            currentSectionTracker = col1; // تحديث المتعقب
                            if(!payload.newGroups.includes(currentSectionTracker)) payload.newGroups.push(currentSectionTracker);
                            continue; // اذهب للصف التالي
                        }

                        // --- معالجة بيانات الطالب ---
                        const id = col0;
                        const name = col1;

                        // التأكد إن ده طالب بجد (عنده ID واسم ومش صف عناوين متكرر)
                        if(id && name && id.toLowerCase() !== 'id') {
                            
                            // تحديد السكشن: لو مكتوب صراحة في عموده خده، لو لأ استخدم المتعقب الذكي
                            let group = currentSectionTracker;
                            if (r[groupColIndex] && !weekColumns[groupColIndex]) {
                                group = String(r[groupColIndex]).trim();
                                if(!payload.newGroups.includes(group)) payload.newGroups.push(group);
                            }

                            payload.students.push({ ID: id, Name: name, Group: group });
                            stdCount++;

                            // --- تحليل الغياب والحضور بذكاء ---
                            for (const colIndex in weekColumns) {
                                const val = r[colIndex];
                                // لو الخلية فيها 1 أو p أو P أو كلمة حضور أو ✔ أو true
                                if (val == 1 || String(val).toLowerCase() === 'p' || String(val) === 'حضور' || String(val) === '✔' || String(val).toLowerCase() === 'true') {
                                    payload.logs.push({
                                        ID: id,
                                        Name: name,
                                        Group: group,
                                        SessionGroup: group,
                                        Week: weekColumns[colIndex],
                                        Date: new Date().toLocaleDateString('en-GB'),
                                        Time: '12:00 PM', // وقت افتراضي للاستيراد
                                        Status: 'Present',
                                        DeviceID: null, 
                                        RSSI: -40
                                    });
                                    logsCount++;
                                }
                            }
                        }
                    }

                    // 4. إرسال الدفعة بالكامل للسيرفر دفعة واحدة (صاروخية الأداء)
                    await server.request('/api/import_excel', 'POST', payload);
                    app.state.data = await server.request('/api/init');
                    
                    this.renderTable(true);
                    app.ui.populateGlobalDropdowns(); // تحديث قوائم السكاشن المنسدلة فوراً
                    
                    Swal.fire({
                        icon: 'success', 
                        title: isEng ? 'Import Successful!' : 'تم الاستيراد بنجاح!', 
                        html: isEng 
                            ? `Identified <b>${payload.newGroups.length}</b> Groups<br>Added/Updated <b>${stdCount}</b> Students<br>Synced <b>${logsCount}</b> Attendance Marks ✔️` 
                            : `تم التعرف على <b>${payload.newGroups.length}</b> مجموعات<br>وإضافة/تحديث <b>${stdCount}</b> طالب<br>وتسجيل <b>${logsCount}</b> علامة حضور ✔️`, 
                        background: '#1e293b', 
                        color: '#fff'
                    });

                } catch (err) {
                    console.error(err);
                    Swal.fire({
                        icon: 'error', 
                        title: isEng ? 'Error' : 'خطأ', 
                        text: isEng ? 'Check Excel format (Column 1: ID, Column 2: Name)' : 'تأكد من تنسيق الشيت (العمود الأول ID، الثاني Name)', 
                        background: '#1e293b', 
                        color: '#fff'
                    });
                } finally {
                    input.value = ''; // تصفير زر الرفع
                }
            };
            reader.readAsArrayBuffer(file);
        }
    },
    
            groups: {
            init() {
        // 🔥 1. تعديل محرك الإشعارات (Scheduler) عشان ينبهك لكل الجلسات ويترجم الأسماء صح
        if(app.scheduler && !app.scheduler._patchedForSessions) {
            app.scheduler.checkSchedule = function() {
                if (!app.state.data || !app.state.data.years) return;
                
                const now = new Date();
                const daysMap = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
                const currentDay = daysMap[now.getDay()];
                const currentMinutes = now.getHours() * 60 + now.getMinutes();

                app.state.data.years.forEach(year => {
                    if(!year.groups) return;
                    
                    year.groups.forEach(g => {
                        // سحب كل الجلسات أو الجلسة القديمة لو مفيش
                        const sessions = g.Sessions && g.Sessions.length > 0 ? g.Sessions : [{Day: g.Day, Time: g.Time}];
                        
                        sessions.forEach((sess, sIdx) => {
                            if (sess.Day !== currentDay || !sess.Time) return;
                            
                            const [h, m] = sess.Time.split(':').map(Number);
                            const startMinutes = h * 60 + m;
                            const diff = startMinutes - currentMinutes;

                            // 🔥 التعديل هنا: فحص الوقت قبلها بـ 15 دقيقة وحتى بعدها بـ 30 دقيقة
                            if (diff <= 15 && diff >= -30) {
                                // إضافة تاريخ اليوم للمفتاح لضمان تجدد الإشعارات في الأيام القادمة
                                const notifKey = `${year.id}_${g.Name}_${startMinutes}_${sIdx}_${now.toDateString()}`;
                                
                                if (!app.scheduler.notifiedGroups.has(notifKey)) {
                                    const isEng = app.lang.current === 'en';
                                    
                                    // 🌟 السر هنا: ترجمة اسم المجموعة قبل إرساله للإشعار
                                    const translatedGroupName = app.lang.t(g.Name);
                                    
                                    // تحديد رقم الجلسة
                                    const sessLabel = sessions.length > 1 ? (isEng ? ` (Session ${sIdx+1})` : ` (جلسة ${sIdx+1})`) : '';
                                    
                                    // دمج الاسم المترجم مع رقم الجلسة
                                    const finalTitle = translatedGroupName + sessLabel;

                                    // 🔥 صياغة النص الذكي بدعم النحو العربي والإنجليزي 🔥
                                    let timeMsg = "";
                                    const absDiff = Math.abs(diff);

                                    // دالة مساعدة لتمييز الدقائق بالعربي
                                    const getArabicMinutes = (m) => {
                                        if (m === 1) return "دقيقة واحدة";
                                        if (m === 2) return "دقيقتين";
                                        if (m >= 3 && m <= 10) return `${m} دقائق`;
                                        return `${m} دقيقة`;
                                    };

                                    // دالة مساعدة لتمييز الدقائق بالإنجليزي
                                    const getEnglishMinutes = (m) => {
                                        return m === 1 ? "1 min" : `${m} mins`;
                                    };

                                    if (diff > 0) {
                                        timeMsg = isEng 
                                            ? `starts in ${getEnglishMinutes(absDiff)}` 
                                            : `تبدأ خلال ${getArabicMinutes(absDiff)}`;
                                    } else if (diff === 0) {
                                        timeMsg = isEng 
                                            ? `is starting NOW!` 
                                            : `تبدأ الآن!`;
                                    } else {
                                        timeMsg = isEng 
                                            ? `started ${getEnglishMinutes(absDiff)} ago` 
                                            : `بدأت منذ ${getArabicMinutes(absDiff)}`;
                                    }

                                    // إرسال الإشعار بعد التعديل
                                    app.scheduler.notify(year.name, finalTitle, sess.Time, timeMsg);
                                    app.scheduler.notifiedGroups.add(notifKey);
                                }
                            }
                        });
                    });
                });
            };
            app.scheduler._patchedForSessions = true;
        }

        // 🔥 2. ربط نافذة المجموعات بالمنطق المرن الجديد
        if(app.ui && !app.ui._modalPatched) {
            app.ui.openGroupModal = (mode, name, day, time) => {
                app.groups.setupDynamicModal(mode, name);
                app.ui.openModal('modal-group-edit');
            };
            app.ui._modalPatched = true;
        }
    },

    formatTime12(t) {

        try {
            let [h, m] = t.split(':').map(Number);
            const isEng = app.lang && app.lang.current === 'en';
            const ampm = h >= 12 ? (isEng ? 'PM' : 'م') : (isEng ? 'AM' : 'ص');
            h = h % 12 || 12;
            return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
        } catch(e) { return t; }
    },

            async saveGroup() { 
                const mode = document.getElementById('group-edit-mode').value;

                const isEng = app.lang.current === 'en';

                }

                // لضمان التوافق مع الكود القديم نحتفظ باليوم والوقت الأساسي

                    Day: firstDay, 
                    Time: firstTime,

                if(mode === 'add') await server.request('/api/groups/add', 'POST', data); 
                else await server.request('/api/groups/update', 'POST', {oldName, newData: data}); 
                
                app.state.data = await server.request('/api/init'); 
                app.ui.closeModal('modal-group-edit');

   matrix: {
        searchTimeout: null,
        itemHeight: 41,
        
        handleSearch() {
            clearTimeout(this.searchTimeout);
            const container = document.querySelector('#view-matrix .overflow-auto');
            if (container) container.scrollTop = 0;
            this.searchTimeout = setTimeout(() => this.render(), 100);
        },
        
        render(preserveState = false) {
            const scrollContainer = document.querySelector('#view-matrix .overflow-auto');
            if (!scrollContainer) return;
            
            let scrollY = 0, scrollX = 0;
            if (preserveState) {
                scrollY = scrollContainer.scrollTop; 
                scrollX = scrollContainer.scrollLeft;
            }

            const isEng = app.lang.current === 'en';
            const group = document.getElementById('matrix-group').value;
            
            const inputId = isEng ? 'matrix-search-en' : 'matrix-search';
            const searchTerm = document.getElementById(inputId)?.value.toLowerCase() || '';
            
            const absentLimit = parseInt(document.getElementById('matrix-absent-limit')?.value) || 0;
            const year = app.getActiveYear();
            const weekCount = app.state.totalWeeks;
            const currentWeekNum = parseInt(app.state.currentWeek.replace('Week ', '')) || 1;
            const defSessions = parseInt(year.defaultSessions) || 1;
            
            const wTitle = isEng ? 'W' : 'أسبوع ';
            const sTitle = isEng ? 'S' : 'ج';
            const absentChar = isEng ? 'A' : 'غ';
            const stickyEdge = isEng ? 'left-0 z-[100] !bg-slate-900 shadow-[2px_0_0_0_#020617] bg-clip-padding' : 'right-0 z-[100] !bg-slate-900 shadow-[-2px_0_0_0_#020617] bg-clip-padding';

            // 🔥 1. حساب الجلسات الفعلية لكل مجموعة وكل أسبوع (ديناميكياً)
            const sessionLimitPerGroup = {}; 
            for (let i = 1; i <= weekCount; i++) {
                const wLabel = `Week ${i}`;
                sessionLimitPerGroup[wLabel] = {};
                
                year.groups.forEach(g => {
                    const configCount = g.Sessions && g.Sessions.length > 0 ? g.Sessions.length : defSessions;
                    sessionLimitPerGroup[wLabel][g.Name] = configCount;
                });

                if (year.logs) {
                    year.logs.forEach(l => {
                        if (l.Week === wLabel) {
                            const sNum = parseInt(l.SubSession) || 1;
                            if (sNum > (sessionLimitPerGroup[wLabel][l.Group] || 0)) {
                                sessionLimitPerGroup[wLabel][l.Group] = sNum;
                            }
                        }
                    });
                }
            }

            if (!preserveState) {
                this.renderedCount = this.renderLimit || 40;
                
                this.allFilteredData = year.students.filter(s => {
                    return (group === 'All' || s.Group === group) &&
                           (!searchTerm || s.Name.toLowerCase().includes(searchTerm) || s.ID.includes(searchTerm));
                });

                const currentFilterGroup = document.getElementById('matrix-group').value;
                
                let hTop = `<th rowspan="2" class="p-3 ${isEng ? 'text-left' : 'text-right'} min-w-[120px] md:min-w-[160px] sticky ${stickyEdge} text-white">${isEng ? 'Student Name' : 'اسم الطالب'}</th>`;
                let hBot = ``;

                // 🔥 2. رسم الأعمدة بناءً على عدد الجلسات في كل أسبوع بشكل مستقل
                for (let i = 1; i <= weekCount; i++) {
                    const wLabel = `Week ${i}`;
                    let sCount = defSessions;
                    
                    if (currentFilterGroup === 'All') {
                        const limits = Object.values(sessionLimitPerGroup[wLabel]);
                        if(limits.length > 0) sCount = Math.max(...limits);
                    } else {
                        sCount = sessionLimitPerGroup[wLabel][currentFilterGroup] || defSessions;
                    }

                    const isCurrent = i === currentWeekNum;
                    const styleTop = isCurrent ? 'text-blue-400 bg-blue-900/30' : 'text-white bg-slate-800';
                    
                    hTop += `<th colspan="${sCount}" class="p-1 text-center text-[10px] border-slate-700 border-x ${styleTop}">${wTitle}${i}</th>`;
                    
                    for(let j=1; j<=sCount; j++) {
                        const styleBot = isCurrent ? 'text-blue-300 bg-blue-900/10' : 'text-slate-400 bg-slate-800/50';
                        hBot += `<th class="p-1 text-center min-w-[35px] text-[9px] border-slate-700 border-x border-t ${styleBot}">${sTitle}${j}</th>`;
                    }
                }

                hTop += `<th rowspan="2" class="p-2 text-center min-w-[45px] text-red-400 bg-slate-800/50 font-black border-slate-700 border-x text-[10px]">${absentChar}</th>`;
                hTop += `<th rowspan="2" class="p-2 text-center min-w-[45px] text-emerald-400 bg-slate-800/50 font-black border-slate-700 border-x text-[10px]">%</th>`;
                
                document.getElementById('matrix-head-row').innerHTML = hTop;
                
                let secondRow = document.getElementById('matrix-head-row-2');
                if(!secondRow) {
                    secondRow = document.createElement('tr');
                    secondRow.id = 'matrix-head-row-2';
                    document.getElementById('matrix-head-row').parentNode.appendChild(secondRow);
                }
                secondRow.innerHTML = hBot;

                if (!scrollContainer.dataset.vlisten) {
                    scrollContainer.addEventListener('scroll', () => {
                        const nearBottom = scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollContainer.scrollHeight - 200;
                        if (nearBottom && !this.isLoadingMore && this.renderedCount < this.allFilteredData.length) this.loadMore();
                    }, { passive: true });
                    scrollContainer.dataset.vlisten = "true";
                }
            } 

            const attendanceMap = new Set();
            if (year.logs) {
                year.logs.forEach(l => attendanceMap.add(`${l.ID}_${l.Week}_${l.SubSession || "1"}`));
            }

            let htmlBuffer = '';
            const limit = Math.min(this.renderedCount || 40, this.allFilteredData.length);
            const shieldText = (text) => text ? text.split('').map(c => `&#${c.charCodeAt(0)};`).join('') : '';

            for (let sIdx = 0; sIdx < limit; sIdx++) {
                const s = this.allFilteredData[sIdx];
                let absent = 0, present = 0, elapsedSessions = 0;
                let rowHtml = '';
                const nameDir = app.ui.getDir(s.Name);
                const currentFilterGroup = document.getElementById('matrix-group').value;

                const isGuestStudent = !s.Group || s.Group.trim() === "" || s.Group === "Ungrouped" || s.Group === "بدون مجموعة";

                for (let i = 1; i <= weekCount; i++) {
                    const wLabel = 'Week ' + i;
                    const effectiveW = app.attendance.getEffectiveWeek(wLabel, s.Group);
                    
                    let sCount = defSessions;
                    if (currentFilterGroup === 'All') {
                        const limits = Object.values(sessionLimitPerGroup[wLabel]);
                        if(limits.length > 0) sCount = Math.max(...limits);
                    } else {
                        sCount = sessionLimitPerGroup[wLabel][currentFilterGroup] || defSessions;
                    }

                    const realStudentSessLimit = sessionLimitPerGroup[wLabel][s.Group] || defSessions;

                    for(let j=1; j<=sCount; j++) {
                        const isHoliday = app.attendance.isHoliday(wLabel, s.Group, j);
                        
                        if (isHoliday && j <= realStudentSessLimit) {
                            rowHtml += `<td class="p-1 text-center opacity-40 text-[9px] bg-amber-900/20 text-amber-500 font-bold border-slate-800/50 border-x select-none">${isEng ? 'Hol' : 'إجازة'}</td>`;
                            continue;
                        }

                        const isPresent = attendanceMap.has(`${s.ID}_${effectiveW}_${j}`);
                        const isAValidSessionForThisStudent = (j <= realStudentSessLimit);

                        if (isAValidSessionForThisStudent) {
                            if (i < currentWeekNum || (i === currentWeekNum && isPresent)) {
                                if (!isGuestStudent) elapsedSessions++; 
                                if (isPresent) present++; 
                                else if (!isGuestStudent) absent++; 
                            }
                        }

                        let statusIcon = '-';
                        let statusClass = 'text-slate-600';

                        if (isPresent) {
                            statusIcon = '✔';
                            statusClass = 'present-cell text-emerald-500 font-bold';
                        } else if (i < currentWeekNum && isAValidSessionForThisStudent) {
                            if (!isGuestStudent) {
                                statusIcon = '✘';
                                statusClass = 'text-red-500 font-bold';
                            }
                        }

                        if (!isAValidSessionForThisStudent) {
                            statusIcon = ''; statusClass = 'bg-slate-900/50';
                        }

                        rowHtml += `<td ${isAValidSessionForThisStudent ? `onclick="app.matrix.toggle('${s.ID}', '${wLabel}', '${effectiveW}', ${isPresent}, '${j}')"` : ''}
                                    class="p-1 text-center border-slate-800/50 border-x transition select-none ${statusClass} ${isAValidSessionForThisStudent ? 'cursor-pointer hover:bg-white/5' : ''}">
                                    ${statusIcon}
                                </td>`;
                    }
                }

                if (absentLimit > 0 && absent <= absentLimit) continue;
                
                const pctDisplay = isGuestStudent ? '-' : (elapsedSessions > 0 ? Math.round((present / elapsedSessions) * 100) + '%' : '0%');
                const absentDisplay = isGuestStudent ? '-' : absent;

                htmlBuffer += `
                <tr class="hover:bg-slate-800/40 transition border-b border-slate-800/50 ${absent > absentLimit && absentLimit > 0 ? 'bg-red-500/10' : ''}">
                    <td class="p-2 font-bold text-white sticky ${stickyEdge} text-[10px] md:text-xs truncate max-w-[120px]"
                        style="direction: ${nameDir}; text-align: ${nameDir === 'rtl' ? 'right' : 'left'}">
                        ${shieldText(s.Name)}
                    </td>
                    ${rowHtml}
                    <td class="p-2 text-center font-black ${absent > 0 && !isGuestStudent ? 'text-red-500' : 'text-slate-600'} border-slate-800/50 border-x text-[10px]">${absentDisplay}</td>
                    <td class="p-2 text-center font-bold ${isGuestStudent ? 'text-slate-600' : 'text-emerald-400'} border-slate-800/50 border-x text-[10px]">${pctDisplay}</td>
                </tr>`;
            }
            
            document.getElementById('matrix-body').innerHTML = htmlBuffer;
            if (preserveState) { scrollContainer.scrollTop = scrollY; scrollContainer.scrollLeft = scrollX; } 
            else { scrollContainer.scrollTop = 0; }
        },

        loadMore() {
            this.isLoadingMore = true;
            this.renderedCount += this.renderLimit || 40;
            this.render(true);
            setTimeout(() => { this.isLoadingMore = false; }, 50);
        },

        updateHolidaySessionsUI() {
            const wEl = document.getElementById('swal-week'); 
            const gEl = document.getElementById('swal-group'); 
            const sessContainer = document.getElementById('swal-sessions-container');
            const isEng = document.documentElement.dir === 'ltr';
            if (!wEl || !gEl || !sessContainer) return;

            const year = app.getActiveYear();
            let maxSess = parseInt(year.defaultSessions) || 1;
            
            if (gEl.value !== 'global') {
                const targetGroup = year.groups.find(g => g.Name === gEl.value);
                if(targetGroup && targetGroup.Sessions) {
                    maxSess = targetGroup.Sessions.length > 0 ? targetGroup.Sessions.length : maxSess;
                }
            } else {
                year.groups.forEach(g => {
                    if(g.Sessions && g.Sessions.length > maxSess) maxSess = g.Sessions.length;
                });
            }
            
            let html = `<div class="flex flex-wrap gap-2 mt-2 justify-center">`;
            html += `<label class="flex items-center gap-1 cursor-pointer text-[11px] text-white bg-slate-800 py-1 px-2 rounded border border-slate-600 hover:bg-slate-700 transition">
                        <input type="checkbox" id="swal-sess-all" value="All" onchange="app.matrix.toggleAllSessions(this)"> 
                        ${isEng ? 'Whole Week' : 'كل الجلسات'}
                     </label>`;
            for(let i=1; i<=maxSess; i++) {
                html += `<label class="flex items-center gap-1 cursor-pointer text-[11px] text-white bg-slate-800 py-1 px-2 rounded border border-slate-600 hover:bg-slate-700 transition">
                            <input type="checkbox" class="swal-sess-cb ind-sess" value="${i}" onchange="app.matrix.updateHolidayBtnText()"> 
                            ${isEng ? 'Session' : 'جلسة'} ${i}
                         </label>`;
            }
            html += `</div>`;
            sessContainer.innerHTML = html;
            app.matrix.updateHolidayBtnText();
        },

        toggleAllSessions(allCb) {
            const cbs = document.querySelectorAll('.swal-sess-cb.ind-sess');
            cbs.forEach(cb => cb.checked = allCb.checked);
            app.matrix.updateHolidayBtnText();
        },

        updateHolidayBtnText() {
            const checkedCbs = document.querySelectorAll('.swal-sess-cb.ind-sess:checked');
            const confirmBtn = Swal.getConfirmButton();
            const denyBtn = Swal.getDenyButton();
            const isEng = document.documentElement.dir === 'ltr';
            
            if(!confirmBtn || !denyBtn) return;

            if (checkedCbs.length === 0 && !document.getElementById('swal-sess-all').checked) {
                confirmBtn.disabled = true;
                denyBtn.disabled = true;
                confirmBtn.innerText = isEng ? 'Select Sessions' : 'اختر الجلسات أولاً';
            } else {
                confirmBtn.disabled = false;
                denyBtn.disabled = false;
                confirmBtn.innerText = isEng ? 'Mark as Holiday' : 'تسجيل إجازة';
                denyBtn.innerText = isEng ? 'Remove Holiday' : 'إلغاء الإجازة';
            }
        },

        async manageHolidays() {
            const year = app.getActiveYear();
            const weeks = Array.from({length: app.state.totalWeeks}, (_, i) => `Week ${i+1}`);
            const groups = [...new Set(year.students.map(s => s.Group))];
            const isEng = document.documentElement.dir === 'ltr';

            await Swal.fire({
                title: isEng ? 'Manage Holidays' : 'إدارة الإجازات', 
                background: '#1e293b', 
                color: '#fff',
                html: `
                <div class="flex flex-col gap-3">
                    <label class="text-[10px] text-slate-400 text-${isEng?'left':'right'} font-bold px-1">${isEng?'Select Week:':'اختر الأسبوع:'}</label>
                    <select id="swal-week" onchange="app.matrix.updateHolidaySessionsUI()" class="swal2-input !m-0 bg-slate-900 text-white border-slate-700 text-sm">
                        ${weeks.map(w => `<option value="${w}">${w}</option>`).join('')}
                    </select>

                    <label class="text-[10px] text-slate-400 text-${isEng?'left':'right'} font-bold px-1">${isEng?'Apply To Group:':'نطاق المجموعة:'}</label>
                    <select id="swal-group" onchange="app.matrix.updateHolidaySessionsUI()" class="swal2-input !m-0 bg-slate-900 text-white border-slate-700 text-sm">
                        <option value="global">${isEng?'All Groups':'لجميع المجموعات'}</option>
                        ${groups.map(g => `<option value="${g}">${g}</option>`).join('')}
                    </select>

                    <label class="text-[10px] text-slate-400 text-${isEng?'left':'right'} font-bold px-1">${isEng?'Select Sessions:':'تحديد الجلسات:'}</label>
                    <div id="swal-sessions-container" class="bg-slate-900/50 p-2 rounded border border-slate-800 min-h-[50px]"></div>
                </div>`,
                showDenyButton: true,
                showCancelButton: true,
                confirmButtonColor: '#10b981', 
                denyButtonColor: '#ef4444',
                cancelButtonText: isEng?'Cancel':'تراجع', 
                heightAuto: false,
                didOpen: () => { app.matrix.updateHolidaySessionsUI(); },
                preConfirm: () => {
                    const w = document.getElementById('swal-week').value;
                    const g = document.getElementById('swal-group').value;
                    const isAll = document.getElementById('swal-sess-all').checked;
                    const cbs = Array.from(document.querySelectorAll('.swal-sess-cb.ind-sess:checked')).map(c => c.value);
                    if (!isAll && cbs.length === 0) {
                        Swal.showValidationMessage(isEng ? 'Please select at least one session' : 'الرجاء اختيار جلسة واحدة على الأقل');
                        return false;
                    }
                    return [w, g, isAll ? ['All'] : cbs];
                }
            }).then(async (result) => {
                if (result.isConfirmed || result.isDenied) {
                    const [week, scope, sessions] = result.value;
                    const isRemove = result.isDenied;
                    
                    Swal.fire({ title: isEng ? 'Saving...' : 'جاري الحفظ...', background: '#1e293b', color: '#fff', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                    
                    for(const sess of sessions) {
                        await server.request('/api/settings/save', 'POST', { holiday: true, week: week, scope: scope, session: sess, remove: isRemove });
                    }
                    
                    app.state.data = await server.request('/api/init');
                    this.render(false);
                    
                    Swal.fire({ 
                        icon: 'success', 
                        title: isRemove ? (isEng?'Holidays Removed':'تم إلغاء الإجازات') : (isEng?'Holidays Saved':'تم تسجيل الإجازات'), 
                        toast: true, position: 'top-end', showConfirmButton: false, timer: 1500, background: '#1e293b', color: '#fff' 
                    });
                }
            });
        },

        async toggle(id, weekLabel, effectiveWeek, currentlyPresent, subSession) {
            if (navigator.vibrate) navigator.vibrate(25);
            const isEng = document.documentElement.dir === 'ltr';
            const result = await Swal.fire({ title: currentlyPresent ? (isEng?'Remove attendance?':'إلغاء الحضور؟') : (isEng?'Mark as present?':'تسجيل حضور؟'), icon: 'question', showCancelButton: true, confirmButtonText: isEng?'Yes':'نعم', confirmButtonColor: currentlyPresent ? '#ef4444' : '#10b981', background: '#1e293b', color: '#fff', heightAuto: false });
            if (result.isConfirmed) {
                const endpoint = currentlyPresent ? '/api/scan/delete' : '/api/scan';
                await server.request(endpoint, 'POST', { id, week: effectiveWeek, status: 'Present', subSession: subSession });
                app.state.data = await server.request('/api/init');
                this.render(true);
            }
        },

        exportExcel() {
            const year = app.getActiveYear();
            const yearName = year.name || "CAMS-I";
            const groupVal = document.getElementById('matrix-group').value;
            const isEng = app.lang.current === 'en'; 
            
            const weekCount = app.state.totalWeeks || 15; 
            const currentWeekNum = parseInt(app.state.currentWeek.replace('Week ', '')) || 1;
            const semesterStart = year.semester && year.semester.start ? new Date(year.semester.start) : new Date();
            const defSessions = parseInt(year.defaultSessions) || 1;
            
            const dateStr = new Date().toLocaleDateString(isEng ? 'en-GB' : 'ar-EG-u-nu-latn').replace(/\//g, '-');

            const getSessionDate = (weekNum, targetDayAr) => {
                if (!targetDayAr || targetDayAr === 'غير محدد') return '-';
                const daysMap = { 'الأحد': 0, 'الاثنين': 1, 'الثلاثاء': 2, 'الأربعاء': 3, 'الخميس': 4, 'الجمعة': 5, 'السبت': 6 };
                const targetDayIndex = daysMap[targetDayAr];
                if (targetDayIndex === undefined) return '-';

                const startDayIndex = semesterStart.getDay();
                let dayOffset = targetDayIndex - startDayIndex;
                if (dayOffset < 0) dayOffset += 7;

                const targetDate = new Date(semesterStart);
                targetDate.setDate(semesterStart.getDate() + ((weekNum - 1) * 7) + dayOffset);
                return targetDate.toLocaleDateString('en-GB'); 
            };

            // 🔥 1. حساب الجلسات الفعلية لكل مجموعة وكل أسبوع (ديناميكياً للإكسيل) 🔥
            const sessionLimitPerGroup = {}; 
            const actualSessionDates = {}; // تخزين تاريخ أول طالب حضر في الجلسة
            const actualSessionDatesFallback = {}; // احتياطي للبحث العام

            for (let i = 1; i <= weekCount; i++) {
                const wLabel = `Week ${i}`;
                sessionLimitPerGroup[wLabel] = {};
                
                year.groups.forEach(g => {
                    const configCount = g.Sessions && g.Sessions.length > 0 ? g.Sessions.length : defSessions;
                    sessionLimitPerGroup[wLabel][g.Name] = configCount;
                });

                if (year.logs) {
                    year.logs.forEach(l => {
                        if (l.Week === wLabel) {
                            const sNum = parseInt(l.SubSession) || 1;
                            if (sNum > (sessionLimitPerGroup[wLabel][l.Group] || 0)) {
                                sessionLimitPerGroup[wLabel][l.Group] = sNum;
                            }
                            
                            // تسجيل تاريخ الجلسة من واقع حضور أول طالب
                            const key = `${l.Week}_${l.SessionGroup || l.Group}_${sNum}`;
                            if (!actualSessionDates[key]) {
                                actualSessionDates[key] = { date: l.Date, time: l.Time };
                            }
                            
                            const fallbackKey = `${l.Week}_${sNum}`;
                            if (!actualSessionDatesFallback[fallbackKey]) {
                                actualSessionDatesFallback[fallbackKey] = { date: l.Date, time: l.Time };
                            }
                        }
                    });
                }
            }

            const sessionDetails = {}; 
            let totalDynamicSessions = 0; // لضبط عرض خلية العنوان في الإكسيل
            const sCountPerWeek = {};

            // 🔥 2. تجهيز رؤوس الأعمدة بناءً على الحسابات الديناميكية السابقة
            for (let i = 1; i <= weekCount; i++) {
                const wLabel = `Week ${i}`;
                let sCount = defSessions;
                
                if (groupVal === 'All') {
                    const limits = Object.values(sessionLimitPerGroup[wLabel] || {});
                    if(limits.length > 0) sCount = Math.max(...limits);
                } else {
                    sCount = sessionLimitPerGroup[wLabel][groupVal] || defSessions;
                }

                sCountPerWeek[wLabel] = sCount;
                totalDynamicSessions += sCount;

                year.groups.forEach(g => {
                    for(let j = 1; j <= sCount; j++) {
                        const key = `${wLabel}_${g.Name}_${j}`;
                        const exactLogKey = `${wLabel}_${g.Name}_${j}`;
                        const fallbackLogKey = `${wLabel}_${j}`;
                        
                        // سحب التاريخ الفعلي إذا وجد
                        if (actualSessionDates[exactLogKey]) {
                            sessionDetails[key] = { 
                                date: actualSessionDates[exactLogKey].date, 
                                time: actualSessionDates[exactLogKey].time 
                            };
                        } else if (groupVal === 'All' && actualSessionDatesFallback[fallbackLogKey]) {
                            sessionDetails[key] = { 
                                date: actualSessionDatesFallback[fallbackLogKey].date, 
                                time: actualSessionDatesFallback[fallbackLogKey].time 
                            };
                        } else {
                            let dayName = '-';
                            let timeVal = '-';
                            if (g.Sessions && g.Sessions[j-1]) {
                                dayName = g.Sessions[j-1].Day;
                                timeVal = g.Sessions[j-1].Time;
                            } else if (j === 1 && g.Day) {
                                dayName = g.Day;
                                timeVal = g.Time || '-';
                            }
                            sessionDetails[key] = { 
                                date: getSessionDate(i, dayName), 
                                time: timeVal 
                            };
                        }
                    }
                });
            }

            const allFiltered = year.students.filter(s => (groupVal === 'All' || s.Group === groupVal));
            const attendanceMap = new Set();
            if (year.logs) year.logs.forEach(l => attendanceMap.add(`${l.ID}_${l.Week}_${l.SubSession || "1"}`));

            const getTextAlign = (text) => {
                if (!text) return isEng ? 'left' : 'right';
                const arabicPattern = /[\u0600-\u06FF]/;
                return arabicPattern.test(text) ? 'right' : 'left';
            };

            // 🔥 3. بناء هيكل الإكسيل 🔥
            let html = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="UTF-8">
            <style>
                table { border-collapse: collapse; font-family: 'Tahoma', 'Arial', sans-serif; }
                .title-card { background-color: #0F172A; color: #FFFFFF; font-size: 18pt; font-weight: bold; text-align: center; height: 50pt; border: 1pt solid #000; }
                .sub-card { background-color: #1E293B; color: #CBD5E1; font-size: 11pt; text-align: center; height: 25pt; border: 1pt solid #334155; }
                .header-w { background-color: #334155; color: #FFFFFF; font-weight: bold; text-align: center; border: 1pt solid #475569; }
                .header-s { background-color: #475569; color: #F8FAFC; text-align: center; border: 1pt solid #64748B; font-size: 9pt; }
                .header-dt { mso-number-format:"\\@"; background-color: #94A3B8; color: #0F172A; text-align: center; border: 1pt solid #CBD5E1; font-size: 8pt; height: 15pt; min-width: 85pt; font-weight: bold;}
                .present { background-color: #DCFCE7; color: #15803D; text-align: center; border: 0.5pt solid #BBF7D0; font-weight: bold; }
                .absent { background-color: #FEE2E2; color: #B91C1C; text-align: center; border: 0.5pt solid #FECACA; font-weight: bold; }
                .holiday { background-color: #FEF3C7; color: #92400E; text-align: center; border: 0.5pt solid #FDE68A; font-size: 10pt; font-style: italic; }
                .std-id { mso-number-format:"\\@"; background-color: #F8FAFC; text-align: center; border: 0.5pt solid #E2E8F0; color: #1E293B; font-family: 'Courier New', monospace; }
                .std-name { background-color: #FFFFFF; padding: 4pt; border: 0.5pt solid #E2E8F0; font-weight: bold; white-space: nowrap; }
                .stats-cell { background-color: #F1F5F9; font-weight: bold; text-align: center; border: 0.5pt solid #CBD5E1; }
                .empty-v { background-color: #F1F5F9; border: 0.5pt solid #E2E8F0; color: #CBD5E1; text-align: center;}
            </style>
            </head>
            <body dir="${isEng ? 'ltr' : 'rtl'}">
                <table>
                    <tr><td class="title-card" colspan="${2 + totalDynamicSessions + 3}">${isEng ? 'STUDENT ATTENDANCE REPORT' : 'تقرير حضور وغياب الطلاب التفصيلي'}</td></tr>
                    <tr>
                        <td class="sub-card" colspan="4"><b>${isEng ? "Subject: " : "المادة: "}</b> ${yearName}</td>
                        <td class="sub-card" colspan="4"><b>${isEng ? "Group: " : "السكشن: "}</b> ${groupVal === 'All' ? (isEng?'All':'الكل') : groupVal}</td>
                        <td class="sub-card" colspan="${totalDynamicSessions - 3}"><b>${isEng ? "Export Date: " : "تاريخ التصدير: "}</b> ${dateStr}</td>
                    </tr>
                    <tr></tr>
                    <tr>
                        <th class="header-w" rowspan="3" style="width: 130pt;">${isEng ? "ID" : "رقم القيد"}</th>
                        <th class="header-w" rowspan="3" style="width: 250pt;">${isEng ? "Student Name" : "اسم الطالب"}</th>`;

            let rowSessions = '<tr>';
            let rowDetails = '<tr>';

            for (let i = 1; i <= weekCount; i++) {
                const wLabel = `Week ${i}`;
                const sCount = sCountPerWeek[wLabel]; // عدد الأعمدة لهذا الأسبوع بالتحديد

                html += `<th class="header-w" colspan="${sCount}">${isEng ? "Week" : "أسبوع"} ${i}</th>`;
                
                for(let j = 1; j <= sCount; j++) {
                    const sessionName = isEng ? `S${j}` : `ج${j}`;
                    rowSessions += `<th class="header-s" style="width: 40pt;">${sessionName}</th>`;
                    
                    let targetGroup = groupVal === 'All' && year.groups.length > 0 ? year.groups[0].Name : groupVal;
                    let dKey = `${wLabel}_${targetGroup}_${j}`;
                    let details = sessionDetails[dKey] || { date: '-', time: '-' };
                    
                    let displayDateTime = details.date !== '-' ? `${details.date} ${details.time !== '-' ? '('+details.time+')' : ''}` : '-';
                    rowDetails += `<th class="header-dt" style="width: 85pt;">${displayDateTime}</th>`; 
                }
            }

            const statHeaders = [isEng ? 'P' : 'حضور', isEng ? 'A' : 'غياب', '%'];
            statHeaders.forEach(h => html += `<th class="header-w" rowspan="3" style="width: 45pt;">${h}</th>`);

            html += `</tr>${rowSessions}</tr>${rowDetails}</tr>`;

            allFiltered.forEach(s => {
                let p = 0, a = 0, el = 0; 
                const nameAlign = getTextAlign(s.Name);
                let row = `<tr><td class="std-id">${s.ID}</td><td class="std-name" style="text-align: ${nameAlign}">${s.Name}</td>`;
                
                const isGuestStudent = !s.Group || s.Group.trim() === "" || s.Group === "Ungrouped" || s.Group === "بدون مجموعة";

                for (let i = 1; i <= weekCount; i++) {
                    const wLabel = `Week ${i}`;
                    const effectiveW = app.attendance.getEffectiveWeek(wLabel, s.Group);
                    const sCount = sCountPerWeek[wLabel];
                    const realStudentSessLimit = sessionLimitPerGroup[wLabel][s.Group] || defSessions;

                    for(let j = 1; j <= sCount; j++) {
                        const isHoliday = app.attendance.isHoliday(wLabel, s.Group, j);
                        
                        if (isHoliday && j <= realStudentSessLimit) {
                            row += `<td class="holiday">${isEng ? 'Holiday' : 'إجازة'}</td>`;
                            continue;
                        }

                        if(j <= realStudentSessLimit) {
                            const isPresent = attendanceMap.has(`${s.ID}_${effectiveW}_${j}`);
                            
                            if (i < currentWeekNum || (i === currentWeekNum && isPresent)) {
                                if (!isGuestStudent) el++;
                                if (isPresent) p++; 
                                else if (!isGuestStudent) a++;
                            }
                            
                            let cellContent = "-";
                            let cls = "std-id";

                            if (isPresent) {
                                cellContent = "✔";
                                cls = "present";
                            } else if (i < currentWeekNum && !isGuestStudent) {
                                cellContent = "✘";
                                cls = "absent";
                            }

                            row += `<td class="${cls}">${cellContent}</td>`;
                        } else {
                            row += `<td class="empty-v">-</td>`;
                        }
                    }
                }
                
                const pctDisplay = isGuestStudent ? '-' : (el > 0 ? Math.round((p / el) * 100) + '%' : '0%');
                const absentDisplay = isGuestStudent ? '-' : a;

                row += `<td class="stats-cell" style="color:#15803D">${p}</td>`;
                row += `<td class="stats-cell" style="color:#B91C1C">${absentDisplay}</td>`;
                row += `<td class="stats-cell">${pctDisplay}</td></tr>`;
                
                html += row;
            });

            html += `</table></body></html>`;

            const fileName = `Attendance_Report_${yearName.replace(/ /g, '_')}_${dateStr}.xls`;
            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });

            if (window.AndroidBridge && window.AndroidBridge.saveExcelFile) {
                const reader = new FileReader();
                reader.onloadend = () => window.AndroidBridge.saveExcelFile(reader.result.split(',')[1], fileName);
                reader.readAsDataURL(blob);
            } else {
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                link.click();
            }
        }
    },
            settings: {
            init() {
                const year = app.getActiveYear();
                const isEng = app.lang.current === 'en';
                
                document.getElementById('set-start').value = year.semester.start;
                document.getElementById('set-end').value = year.semester.end;
                
                // قراءة عدد الجلسات الافتراضي للمقرر الحالي
                const defSessEl = document.getElementById('set-default-sessions');
                if(defSessEl) defSessEl.value = year.defaultSessions || 1;
                
                // تعبئة حقول الهوية عند فتح الإعدادات
                const colInput = document.getElementById('set-college-name');
                const uniInput = document.getElementById('set-university-name');
                if(colInput) colInput.value = app.state.data.collegeName || '';
                if(uniInput) uniInput.value = app.state.data.universityName || '';
                
                this.renderMappingList();
                this.updateIdentityDisplay();
            },

            renderMappingList() {
                const list = document.getElementById('mapping-list');
                if (!list) return;
                const year = app.getActiveYear();
                const isEng = app.lang.current === 'en';
                let html = '';

                // 🔥 مترجم فوري لضبط كلمة (Week / الأسبوع) بناءً على اللغة الحالية
                const formatWeek = (wStr) => {
                    if (!wStr) return '';
                    return isEng ? wStr.replace('الأسبوع ', 'Week ') : wStr.replace('Week ', 'الأسبوع ');
                };

                if (year.weekMapping) {
                    for (const scope in year.weekMapping) {
                        for (const realW in year.weekMapping[scope]) {
                            const targetW = year.weekMapping[scope][realW];
                            
                            // نترجم الأسابيع للعرض فقط على الشاشة
                            const displayRealW = formatWeek(realW);
                            const displayTargetW = formatWeek(targetW);

                            html += `
                            <div class="flex justify-between items-center bg-slate-950 p-2 rounded-lg border border-slate-800 text-[11px] mb-2 animate-fade-in">
                                <div class="flex flex-col">
                                    <span class="text-purple-400 font-bold">${scope === 'global' ? (isEng ? 'All Groups' : 'الكل') : scope}</span>
                                    <span class="text-slate-300" dir="ltr">${displayRealW} &rarr; ${displayTargetW}</span>
                                </div>
                                <button onclick="app.settings.deleteMapping('${scope}', '${realW}')" class="text-slate-500 hover:text-red-500 p-2 transition-all active:scale-90">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>`;
                        }
                    }
                }
                
                // رسالة "لا توجد ترحيلات" مترجمة وتستجيب للتغيير اللحظي
                list.innerHTML = html || `<p class="text-center text-slate-600 py-4 text-xs italic">${isEng ? 'No active offsets' : 'لا توجد ترحيلات نشطة'}</p>`;
            },

            },

            // 🔥 4. تحديث الإعدادات لتقوم باقتطاع الجلسات الزائدة وإبلاغ الماتركس فوراً
            async saveDates() {
                const year = app.getActiveYear();
                const start = document.getElementById('set-start').value;
                const end = document.getElementById('set-end').value;
                const isEng = app.lang.current === 'en';
                
                const defaultSessions = parseInt(document.getElementById('set-default-sessions').value) || 1;
                const oldDefSessions = parseInt(year.defaultSessions) || 1;

                if(!start || !end) return Swal.fire({
                    icon:'warning', 
                    text: isEng ? 'Please select both dates' : 'يرجى تحديد التاريخين', 
                    background:'#1e293b', color:'#fff'
                });

                let shouldSyncGroups = false;

                // إذا قام المستخدم بتقليل العدد، نسأله هل يريد القص من المجموعات الحالية؟
                if (defaultSessions < oldDefSessions) {
                    const c = await Swal.fire({
                        title: isEng ? 'Apply to existing groups?' : 'تطبيق على المجموعات الحالية؟',
                        text: isEng ? `You reduced the sessions to ${defaultSessions}. Remove extra sessions from existing groups too?` : `لقد قمت بتقليل الجلسات إلى ${defaultSessions}. هل تريد حذف الجلسات الزائدة من المجموعات الحالية أيضاً؟`,
                        icon: 'question',
                        showCancelButton: true,
                        showDenyButton: true,
                        confirmButtonText: isEng ? 'Yes, truncate' : 'نعم، احذف الزائد',
                        denyButtonText: isEng ? 'No, keep them' : 'لا، اتركهم كما هم',
                        cancelButtonText: isEng ? 'Cancel' : 'إلغاء',
                        confirmButtonColor: '#ef4444',
                        denyButtonColor: '#3b82f6',
                        background:'#1e293b', color:'#fff'
                    });
                    
                    if (c.isDismissed) return;
                    if (c.isConfirmed) shouldSyncGroups = true;
                }

                if (shouldSyncGroups) {
                    year.groups.forEach(g => {
                        if (g.Sessions && g.Sessions.length > defaultSessions) {
                            g.Sessions = g.Sessions.slice(0, defaultSessions);
                            g.Day = g.Sessions[0].Day;
                            g.Time = g.Sessions[0].Time;
                        }
                    });
                    server.save(); 
                }

                await server.request('/api/settings/save', 'POST', {semester: { start, end }, defaultSessions});
                app.state.data = await server.request('/api/init');
                app.calculateTime();

                const scanWeekSelect = document.getElementById('scan-week');
                if (scanWeekSelect) {
                    scanWeekSelect.value = app.state.currentWeek;
                }

                app.ui.populateGlobalDropdowns();

                // 🔥 الضربة القوية: تحديث الماتركس فوراً ليعكس عدد الجلسات الجديد
                if (app.matrix && typeof app.matrix.render === 'function') {
                    app.matrix.render();
                }

                Swal.fire({
                    icon:'success', 
                    title: isEng ? 'Settings Updated' : 'تم تحديث الإعدادات بنجاح', 
                    toast:true, position:'top-end', showConfirmButton:false, timer:1500, background:'#1e293b', color:'#fff'
