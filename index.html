<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CAMS-S">

<link rel="icon" type="image/png" sizes="32x32" href="images/my-icon.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/my-icon.png">
<link rel="apple-touch-icon" href="images/my-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAMS-S</title>

    <script src="js/tailwindcss.js"></script>
    <script src="js/sweetalert2.all.min.js"></script>
    <script src="js/qrcode.min.js"></script>
    <link href="css/all.min.css" rel="stylesheet">
    
    <script>
       
        if (localStorage.getItem('vet_student_lang') === 'en') {
            document.documentElement.style.opacity = '0';
            document.documentElement.dir = 'ltr';
        }
    </script>

    <style>
      
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0f172a; 
            color: #fff; 
        }
        
        .input-field { 
            background: #1e293b; 
            border: 1px solid #334155; 
            color: white; 
            transition: all 0.3s; 
        }
        
        .input-field:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); 
            outline: none; 
        }
        
        .mode-present { 
            border-color: #10b981 !important; 
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); 
        }
        
        .mode-error { 
            border-color: #ef4444 !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); 
        }
        
        .mode-pending { 
            border-color: #f59e0b !important; 
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); 
        }
        
        #qrcode { 
            background-color: #ffffff; 
            padding: 20px; 
            border-radius: 8px;
            display: inline-block;
        }
        
        #qrcode img { 
            display: block; 
            margin: 0 auto;
            image-rendering: crisp-edges; 
        }
        
        .shake-error { animation: shake 0.5s; }
        
        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-5px); } 
            75% { transform: translateX(5px); } 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative overflow-y-auto custom-scrollbar">

    <div id="main-card" class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl overflow-hidden relative transition-all duration-500 mb-8">
        
        <div class="h-2 w-full bg-slate-800">
            <div id="status-bar" class="h-full w-0 bg-red-500 transition-all duration-500"></div>
        </div>

        <div class="p-6 text-center">
            
            <div class="flex justify-between items-center mb-6">
                <div class="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 shadow-inner">
                    <i class="fa-solid fa-graduation-cap text-2xl text-blue-500"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black">تسجيل الحضور</h1>
                    <p id="conn-text" class="text-[10px] text-slate-500 font-mono mt-1">Connecting...</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="langEngine.toggle()" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl flex items-center justify-center border border-slate-700 transition" title="تغيير اللغة">
                        <i class="fa-solid fa-globe"></i>
                    </button>
                    <button onclick="fetchMyStats()" class="w-10 h-10 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 rounded-xl flex items-center justify-center border border-blue-500/20 transition group" title="سجل حضوري">
                        <i class="fa-solid fa-chart-pie text-lg group-hover:scale-110 transition-transform"></i>
                    </button> 
                </div>
            </div>

            <div id="input-section" class="space-y-4 text-right transition-all duration-300">
                
                <div class="relative w-full">
                    <label class="text-xs text-slate-400 font-bold pr-2 flex justify-between mb-1">
                        <span>الاسم أو المقرر</span>
                        <span class="text-[10px] text-emerald-500 font-bold" id="save-status"></span>
                    </label>
                    
                    <div class="flex items-stretch h-[52px] bg-slate-800 rounded-xl border border-slate-600 focus-within:border-blue-500 focus-within:shadow-[0_0_10px_rgba(59,130,246,0.3)] transition-all overflow-hidden">
                        
                        <button onclick="forceSaveProfile()" 
                                class="w-14 shrink-0 bg-slate-800 hover:bg-emerald-600 text-emerald-500 hover:text-white flex items-center justify-center transition-colors outline-none border-none" 
                                title="حفظ هذا الملف في الهاتف">
                            <i class="fa-solid fa-plus text-xl"></i>
                        </button>

                        <div class="w-[1px] bg-slate-600 my-2"></div>

                        <input type="text" id="std-name" autocomplete="off" onfocus="showSavedProfiles()" oninput="filterProfiles(); startLiveTracking();" 
                               class="flex-1 bg-transparent text-white px-4 text-sm font-bold shadow-inner outline-none border-none placeholder-slate-400" 
                               placeholder="اكتب اسمك أو المادة...">
                    </div>
                    
                    <div id="profiles-dropdown" class="hidden absolute top-full left-0 right-0 bg-slate-800 border border-slate-700 rounded-xl mt-1 shadow-2xl z-50 max-h-40 overflow-y-auto custom-scrollbar"></div>
                </div>
                
                <div>
                    <label class="text-xs text-slate-400 font-bold pr-2 flex justify-between mb-1">
                        <span>رقم التعريفي</span>
                        <span id="id-counter" class="text-blue-400 font-mono"></span>
                    </label>
                    <input type="number" id="std-id" 
                           oninput="if(this.value.length > 14) this.value = this.value.slice(0, 14); handleIdInput(); startLiveTracking();" 
                           class="input-field w-full p-3.5 rounded-xl text-sm font-bold tracking-widest text-center shadow-inner" 
                           placeholder="أدخل 6 أرقام على الأقل">
                </div>

               <div>
                    <label class="text-xs text-orange-400 font-bold pr-2 flex justify-between mb-1">
                        <span>كود المحاضرة</span>
                        <i class="fa-solid fa-key"></i>
                    </label>
                    <input type="text" id="session-otp" autocomplete="off"
                           class="input-field w-full p-3.5 rounded-xl text-xl font-black tracking-[0.5em] text-center text-orange-500 border-orange-900/30 focus:border-orange-500 placeholder-slate-700 shadow-inner uppercase" 
                           placeholder="-----" maxlength="5"
                           oninput="
                               this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 5); 
                               if(this.value.length === 5) { 
                                   if(window.AndroidBridge && window.AndroidBridge.setRoomCode) {
                                       window.AndroidBridge.setRoomCode(this.value); 
                                   }
                                   handleCodeInput(this.value); 
                               }
                           ">
                </div>
            </div>

            <div id="qr-container" class="hidden mt-6 animate-fade-in flex flex-col items-center">
                <div class="bg-white p-2 rounded-xl shadow-[0_0_50px_rgba(255,255,255,0.5)] border-4 border-slate-700">
                    <div id="qrcode"></div>
                </div>
                <p class="text-[11px] text-amber-500 font-bold mt-3 bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">
                    <i class="fa-regular fa-sun"></i> ارفع إضاءة الشاشة لأقصى حد
                </p>
            </div>
            
            <div id="live-signal-box" class="mt-5 bg-slate-950 border border-slate-800 p-3 rounded-xl flex items-center justify-between hidden transition-all shadow-inner">
                <div class="flex items-center gap-2">
                    <div id="signal-dot" class="w-3 h-3 rounded-full bg-slate-500 animate-pulse"></div>
                    <span id="signal-text" class="text-xs font-bold text-slate-400">جاري فحص المكان...</span>
                </div>
                <span id="signal-value" class="text-[10px] font-mono text-slate-500 dir-ltr">- dBm</span>
            </div>
            
            <div id="leave-msg" class="hidden mt-5 p-4 bg-emerald-900/40 border border-emerald-500 rounded-2xl animate-bounce shadow-lg">
                <div class="flex items-center gap-3 text-emerald-400">
                    <i class="fa-solid fa-circle-check text-3xl drop-shadow-[0_0_10px_rgba(16,185,129,0.5)]"></i>
                    <div class="text-right">
                        <p class="text-sm font-black">تم تسجيل حضورك بنجاح!</p>
                        <p class="text-[11px] font-bold mt-1 text-emerald-100">يرجى فصل "الواي فاي" الآن فوراً للسماح لزملائك بالدخول.</p>
                    </div>
                </div>
            </div>

            <div class="mt-8">
                <button id="btn-attend" onclick="handleButtonClick()" disabled class="w-full bg-slate-800 text-slate-500 font-black py-4 rounded-2xl text-lg transition-all duration-300 flex items-center justify-center gap-3 shadow-lg cursor-not-allowed group">
                    <i class="fa-solid fa-wifi group-hover:scale-110 transition-transform"></i>
                    <span id="btn-text">أدخل 6 أرقام على الأقل...</span>
                </button>
                <p id="status-message" class="text-xs font-bold mt-3 h-4 transition-colors duration-300 text-slate-600">--</p>
            </div>
            
        </div>
    </div>
<script src="core-app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Offline Mode Ready!', reg))
                    .catch(err => console.log('Offline Mode Failed: ', err));
            });
        }
    </script>
